        function computePredictionScore(eventType) {
            try {
                const config = PREDICTOR_CONFIGS[eventType];
                if (!config) {
                    return { finalScore: 50, bias: 'neutral', confidence: 0, details: [] };
                }
                const fields = config.indicators;
                let totalWeight = 0;
                let weightedScore = 0;
                let details = [];

                fields.forEach(field => {
                    const el = document.getElementById('pred_' + field.id);
                    if (!el || !el.value) return;
                    const val = el.value;
                    const weight = config.weights[field.id];
                    if (!weight) return;

                    let indicatorScore = 50;
                    let interpretation = '';

                    if (field.type === 'select') {
                        const lowerVal = val.toLowerCase();
                        if (lowerVal.includes('beat') || lowerVal.includes('strong') || lowerVal.includes('rising') ||
                            lowerVal.includes('increasing') || lowerVal.includes('accelerating') || lowerVal.includes('good') ||
                            lowerVal.includes('positive') || lowerVal.includes('growing') || lowerVal.includes('yen weak') ||
                            lowerVal.includes('above') || lowerVal.includes('hotter')) {
                            indicatorScore = 75;
                            interpretation = 'Bullish signal';
                        } else if (lowerVal.includes('miss') || lowerVal.includes('weak') || lowerVal.includes('falling') ||
                                   lowerVal.includes('decreasing') || lowerVal.includes('decelerating') || lowerVal.includes('bad') ||
                                   lowerVal.includes('negative') || lowerVal.includes('shrinking') || lowerVal.includes('yen strong') ||
                                   lowerVal.includes('below') || lowerVal.includes('cooler')) {
                            indicatorScore = 25;
                            interpretation = 'Bearish signal';
                        } else {
                            indicatorScore = 50;
                            interpretation = 'Neutral';
                        }
                    } else if (field.type === 'number') {
                        const numVal = parseFloat(val);
                        if (!isNaN(numVal)) {
                            if (numVal > 50) {
                                indicatorScore = 70;
                                interpretation = 'Above threshold';
                            } else if (numVal > 0) {
                                indicatorScore = 60;
                                interpretation = 'Positive reading';
                            } else {
                                indicatorScore = 40;
                                interpretation = 'Below threshold';
                            }
                        }
                    }

                    weightedScore += indicatorScore * weight;
                    totalWeight += weight;
                    details.push({ name: field.label, score: indicatorScore, weight: weight, interp: interpretation });
                });

                if (totalWeight === 0) {
                    return { finalScore: 50, bias: 'neutral', confidence: 0, details: [] };
                }

                const finalScore = Math.round(weightedScore / totalWeight);
                let bias = 'neutral';
                if (finalScore >= 60) bias = 'bullish';
                else if (finalScore <= 40) bias = 'bearish';

                const totalConfigWeight = Object.values(config.weights).reduce((a, b) => a + b, 0);
                const confidence = Math.round((totalWeight / totalConfigWeight) * 100);

                return { finalScore, bias, confidence, details };
            } catch (err) {
                console.error('computePredictionScore error:', err);
                return { finalScore: 50, bias: 'neutral', confidence: 0, details: [] };
            }
        }


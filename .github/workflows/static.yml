<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4US Trading Community — Forex Trading Suite</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg: #050505;
            --bg-card: #0a0a0a;
            --bg-elevated: #111111;
            --bg-input: #1a1a1a;
            --border: #2a2a2a;
            --border-hover: #3a3a3a;
            --text: #f5f5f5;
            --text-muted: #888888;
            --text-dim: #555555;
            --red: #dc2626;
            --red-bright: #ff3333;
            --red-glow: rgba(220, 38, 38, 0.4);
            --red-dim: rgba(220, 38, 38, 0.15);
            --green: #16a34a;
            --green-dim: rgba(22, 163, 74, 0.15);
            --gold: #f59e0b;
            --gold-dim: rgba(245, 158, 11, 0.15);
            --accent: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: var(--text);
            text-decoration: none;
        }
        .nav-logo img {
            width: 42px; height: 42px;
            border-radius: 10px;
            object-fit: cover;
        }
        .nav-logo span { color: var(--red); }
        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
            position: relative;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--red); }
        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -24px;
            left: 0; right: 0;
            height: 2px;
            background: var(--red);
            box-shadow: 0 0 10px var(--red-glow);
        }
        .nav-cta {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--red), #991b1b);
            border: 1px solid rgba(220, 38, 38, 0.5);
            border-radius: 8px;
            color: white;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
        }
        .nav-cta:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.5);
        }
        .nav-mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 100px 40px 60px;
            position: relative;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(220, 38, 38, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(220, 38, 38, 0.05) 0%, transparent 40%),
                linear-gradient(180deg, var(--bg) 0%, #0a0a0a 100%);
        }
        .hero-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 60px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        .hero-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .hero-welcome {
            color: var(--red);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 16px;
        }
        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #ffffff 0%, #cccccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-title span {
            color: var(--red);
            -webkit-text-fill-color: var(--red);
        }
        .hero-subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--red);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .hero-desc {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.7;
            max-width: 500px;
            margin-bottom: 32px;
        }
        .hero-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--red), #991b1b);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
            text-decoration: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(220, 38, 38, 0.6);
        }
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-secondary:hover {
            border-color: var(--red);
            color: var(--red);
            background: var(--red-dim);
        }
        .hero-right {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .hero-logo-ring {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px solid rgba(220, 38, 38, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: pulse-ring 4s ease-in-out infinite;
        }
        .hero-logo-ring::before {
            content: '';
            position: absolute;
            inset: 20px;
            border-radius: 50%;
            border: 1px solid rgba(220, 38, 38, 0.2);
        }
        .hero-logo-ring::after {
            content: '';
            position: absolute;
            inset: 40px;
            border-radius: 50%;
            border: 1px solid rgba(220, 38, 38, 0.15);
        }
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 30px rgba(220, 38, 38, 0.2); }
            50% { box-shadow: 0 0 60px rgba(220, 38, 38, 0.4); }
        }
        .hero-logo-img {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(220, 38, 38, 0.5);
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.3);
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1px;
            background: var(--border);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .stat-item {
            background: var(--bg-card);
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .stat-icon {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }
        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* ===== LIVE MARKETS ===== */
        .markets-section {
            padding: 80px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .live-dot {
            width: 8px; height: 8px;
            background: var(--red);
            border-radius: 50%;
            animation: blink 2s infinite;
            box-shadow: 0 0 8px var(--red);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .view-all-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .view-all-btn:hover { color: var(--red); }
        .markets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        .market-card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .market-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.2s;
            position: relative;
            cursor: pointer;
        }
        .market-card:hover {
            border-color: var(--red);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.15);
        }
        .market-open-chart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(220, 38, 38, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 2;
        }
        .market-card:hover .market-open-chart {
            opacity: 1;
        }
        .market-card:hover .market-chart {
            opacity: 0.3;
        }
        .market-card:hover .market-price {
            opacity: 0.3;
        }
        .market-card:hover .market-header {
            opacity: 0.3;
        }
        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .market-name {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .market-sub {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .market-change {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
        }
        .market-change.up {
            color: var(--green);
            background: var(--green-dim);
        }
        .market-change.down {
            color: var(--red);
            background: var(--red-dim);
        }
        .market-price {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .market-chart {
            height: 60px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            padding-bottom: 8px;
        }
        .chart-bar {
            flex: 1;
            border-radius: 2px 2px 0 0;
            transition: height 0.3s;
        }

        /* ===== FEATURE CARDS ===== */
        .features-section {
            padding: 80px 40px;
            background: linear-gradient(180deg, var(--bg) 0%, var(--bg-card) 50%, var(--bg) 100%);
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .feature-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 28px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .feature-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--red), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .feature-card:hover::before { opacity: 1; }
        .feature-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .feature-icon {
            width: 56px; height: 56px;
            background: var(--red-dim);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.1);
        }
        .feature-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .feature-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .feature-link {
            color: var(--red);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.2s;
        }
        .feature-link:hover { gap: 10px; }

        /* ===== TRUSTED BY ===== */
        .trusted-section {
            padding: 60px 40px;
            text-align: center;
            border-top: 1px solid var(--border);
        }
        .trusted-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 24px;
        }
        .trusted-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 48px;
            flex-wrap: wrap;
        }
        .trusted-logo {
            color: var(--text-dim);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        .trusted-logo:hover { color: var(--text-muted); }

        /* ===== FOOTER ===== */
        .footer {
            border-top: 1px solid var(--border);
            padding: 40px;
            background: var(--bg-card);
        }
        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }
        .footer-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .footer-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
        }
        .footer-logo span { color: var(--red); }
        .footer-tagline {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .footer-links {
            display: flex;
            gap: 24px;
        }
        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .footer-links a:hover { color: var(--red); }
        .footer-social {
            display: flex;
            gap: 16px;
        }
        .footer-social a {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .footer-social a:hover {
            border-color: var(--red);
            color: var(--red);
            background: var(--red-dim);
            transform: translateY(-2px);
        }

        /* ===== APP PANELS ===== */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }
        .app-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 32px;
            border-bottom: 2px solid var(--border);
            justify-content: center;
        }
        .app-tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 16px 40px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }
        .app-tab:hover { color: var(--text); }
        .app-tab.active {
            color: var(--red);
            border-bottom-color: var(--red);
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
        }
        .app-panel { display: none; }
        .app-panel.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .calc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--border-hover); }
        .card-title {
            color: var(--red);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group.full { grid-column: 1 / -1; }
        label {
            display: block;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-bottom: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input, select, textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
        }
        textarea { resize: vertical; min-height: 100px; }
        .risk-slider {
            width: 100%;
            margin: 12px 0;
            accent-color: var(--red);
            height: 6px;
        }
        .risk-value {
            text-align: center;
            color: var(--red);
            font-weight: 800;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 8px;
        }
        .presets {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .preset-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .preset-btn:hover { background: var(--border); color: var(--text); }
        .preset-btn.active {
            background: var(--red);
            color: white;
            font-weight: 700;
            border-color: var(--red);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.4);
        }
        .result-big {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            margin-bottom: 20px;
        }
        .result-label { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .result-number {
            color: #fff;
            font-size: 3rem;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            font-variant-numeric: tabular-nums;
        }
        .result-unit { color: var(--text-muted); font-size: 0.9rem; }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            transition: all 0.2s;
        }
        .stat-box:hover { border-color: var(--border-hover); }
        .stat-label { color: var(--text-muted); font-size: 0.7rem; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value {
            color: var(--text);
            font-size: 1.2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            font-family: 'Orbitron', sans-serif;
        }
        .stat-value.red { color: var(--red); }
        .stat-value.green { color: var(--green); }
        .stat-value.amber { color: var(--gold); }
        .stat-value.cyan { color: var(--red); }
        .risk-bar-container { margin-top: 20px; }
        .risk-bar-bg {
            height: 8px;
            background: var(--bg-input);
            border-radius: 4px;

        function getMonday(d) {
            d = new Date(d);
            let day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function renderHeadlines() {
            let today = new Date();
            let currentMonday = getMonday(today);
            let currentWeekStart = currentMonday.toISOString().split('T')[0];

            let weekData = HEADLINE_DB.find(w => w.weekStart === currentWeekStart);

            // If no exact match, find the closest previous week
            if (!weekData) {
                let sorted = HEADLINE_DB.filter(w => new Date(w.weekStart) <= currentMonday).sort((a,b) => new Date(b.weekStart) - new Date(a.weekStart));
                weekData = sorted[0];
            }

            if (!weekData) {
                document.getElementById('dynamic-headlines-container').innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:40px;">Headlines loading...</p>';
                return;
            }

            let html = '<div style="display:flex; flex-direction:column; gap:16px;">';
            weekData.stories.forEach(story => {
                html += `<div style="padding:20px; background:var(--bg-input); border-radius:14px; border-left:4px solid ${story.border}; position:relative;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
                        <div style="font-size:1rem; font-weight:700; color:var(--text);">${story.title}</div>
                        <span style="padding:4px 12px; background:${story.bg}; color:${story.color}; border-radius:6px; font-size:0.75rem; font-weight:700; white-space:nowrap;">&#128240; ${story.tag}</span>
                    </div>
                    <div style="font-size:0.85rem; color:var(--text-muted); line-height:1.6;">${story.date} — ${story.desc}</div>
                </div>`;
            });
            html += '</div>';

            let container = document.getElementById('dynamic-headlines-container');
            if (container) container.innerHTML = html;
        }

        renderHeadlines();
        setInterval(renderHeadlines, 3600000);
    })();

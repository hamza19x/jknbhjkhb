        const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        function getMonday(d) {
            d = new Date(d);
            let day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function getWeekRange(monday) {
            let friday = new Date(monday);
            friday.setDate(monday.getDate() + 4);
            return {
                start: monday.toISOString().split('T')[0],
                end: friday.toISOString().split('T')[0],
                label: monday.getDate() + '-' + friday.getDate() + ' ' + MONTHS[monday.getMonth()]
            };
        }

        function formatDateLabel(dateStr) {
            let d = new Date(dateStr + 'T00:00:00');
            return DAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
        }

        function getEventsForWeek(startDate, endDate) {
            return EVENT_DB.filter(e => e.date >= startDate && e.date <= endDate).sort((a,b) => a.date.localeCompare(b.date));
        }

        function getColorForBias(bias) {
            if (bias === 'BULL') return { color: 'var(--green)', bg: 'var(--green-dim)', bar: 'var(--green)' };
            if (bias === 'BEAR') return { color: 'var(--red)', bg: 'var(--red-dim)', bar: 'var(--red)' };
            return { color: 'var(--gold)', bg: 'var(--gold-dim)', bar: 'var(--gold)' };
        }

        function renderEventCard(evt) {
            let colors = getColorForBias(evt.bias);
            let probText = evt.prob + '% ' + evt.bias;
            let impactClass = evt.impact === 'high' ? 'font-weight:700;' : '';
            return `<div style="padding:14px; background:var(--bg-input); border-radius:12px; border-left:3px solid ${colors.bar}; margin-bottom:10px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                    <span style="font-size:0.85rem; ${impactClass} color:var(--text);">${evt.flag} ${evt.event}</span>
                    <span style="padding:2px 8px; background:${colors.bg}; color:${colors.color}; border-radius:4px; font-size:0.7rem; font-weight:700;">${probText}</span>
                </div>
                <div style="height:4px; background:var(--bg-card); border-radius:2px; margin-bottom:6px;">
                    <div style="width:${evt.prob}%; height:100%; background:${colors.bar}; border-radius:2px;"></div>
                </div>
                <div style="font-size:0.75rem; color:var(--text-muted);">${evt.pairs} — ${evt.move}</div>
            </div>`;
        }

        function renderDayCard(dateStr, events, isHistory) {
            let d = new Date(dateStr + 'T00:00:00');
            let dayName = DAYS[d.getDay()];
            let dayNum = d.getDate();
            let monthName = MONTHS[d.getMonth()];
            let eventsHtml = events.length ? events.map(renderEventCard).join('') : '<div style="padding:12px; color:var(--text-dim); font-size:0.85rem; text-align:center;">No major events</div>';
            let opacity = isHistory ? 'opacity:0.85;' : '';
            let borderColor = isHistory ? 'var(--border)' : 'var(--border)';
            let titleColor = isHistory ? 'var(--text-dim)' : 'var(--red)';
            return `<div class="card" style="padding:24px; ${opacity} border:1px solid ${borderColor};">
                <h3 style="font-family:Orbitron; font-size:1rem; color:${titleColor}; margin-bottom:16px; display:flex; align-items:center; gap:8px;">&#128197; ${dayName}, ${monthName} ${dayNum}</h3>
                <div style="display:flex; flex-direction:column; gap:0;">${eventsHtml}</div>
            </div>`;
        }

        function renderHistoryCard(weekLabel, events) {
            if (!events.length) return '';
            let items = events.map(e => {
                let colors = getColorForBias(e.bias);
                return `<div style="padding:10px; background:var(--bg-input); border-radius:8px; border-left:2px solid ${colors.bar}; margin-bottom:6px;">
                    <div style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">${e.flag} ${e.event}</div>
                    <div style="font-size:0.7rem; color:var(--text-dim); margin-top:2px;">${e.pairs} — ${e.move}</div>
                </div>`;
            }).join('');
            return `<div class="card" style="padding:24px; border:1px solid var(--border); opacity:0.85;">
                <h3 style="font-family:Orbitron; font-size:1rem; color:var(--text-dim); margin-bottom:16px; display:flex; align-items:center; gap:8px;">&#128220; Last Week — ${weekLabel}</h3>
                <div style="display:flex; flex-direction:column; gap:0;">${items}</div>
            </div>`;
        }

        function renderNextWeekCard(weekLabel, events) {
            if (!events.length) return '';
            let items = events.map(e => {
                let colors = getColorForBias(e.bias);
                let dayLabel = formatDateLabel(e.date).split(', ')[1];
                return `<div style="padding:12px; background:${e.impact === 'high' ? 'var(--red-dim)' : 'var(--bg-input)'}; border-radius:12px; border-left:3px solid ${colors.bar}; margin-bottom:10px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                        <span style="font-size:0.85rem; font-weight:700; color:${e.impact === 'high' ? 'var(--red)' : 'var(--text)'}">${e.flag} ${e.event}</span>
                        <span style="padding:2px 8px; background:${colors.bg}; color:${colors.color}; border-radius:4px; font-size:0.7rem; font-weight:700;">${e.prob}% ${e.bias}</span>
                    </div>
                    <div style="font-size:0.75rem; color:var(--text-muted);">${dayLabel} · ${e.pairs} — ${e.move}</div>
                </div>`;
            }).join('');
            return `<div class="card" style="padding:24px; border:1px solid var(--red);">
                <h3 style="font-family:Orbitron; font-size:1rem; color:var(--red); margin-bottom:16px; display:flex; align-items:center; gap:8px;">&#9889; Next Week — ${weekLabel}</h3>
                <div style="display:flex; flex-direction:column; gap:0;">${items}</div>
            </div>`;
        }

        function renderCalendar() {
            let today = new Date();
            let currentMonday = getMonday(today);
            let currentWeek = getWeekRange(currentMonday);

            let lastMonday = new Date(currentMonday);
            lastMonday.setDate(currentMonday.getDate() - 7);
            let lastWeek = getWeekRange(lastMonday);

            let nextMonday = new Date(currentMonday);
            nextMonday.setDate(currentMonday.getDate() + 7);
            let nextWeek = getWeekRange(nextMonday);

            let currentEvents = getEventsForWeek(currentWeek.start, currentWeek.end);
            let lastEvents = getEventsForWeek(lastWeek.start, lastWeek.end);
            let nextEvents = getEventsForWeek(nextWeek.start, nextWeek.end);

            let html = '<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:16px; margin-bottom:32px;">';

            // Last Week History Card
            if (lastEvents.length > 0) {
                html += renderHistoryCard(lastWeek.label, lastEvents);
            }

            // Current Week Days (Mon-Fri)
            for (let i = 0; i < 5; i++) {
                let d = new Date(currentMonday);
                d.setDate(currentMonday.getDate() + i);
                let dateStr = d.toISOString().split('T')[0];
                let dayEvents = currentEvents.filter(e => e.date === dateStr);
                html += renderDayCard(dateStr, dayEvents, false);
            }

            // Next Week Preview Card
            if (nextEvents.length > 0) {
                html += renderNextWeekCard(nextWeek.label, nextEvents);
            }

            html += '</div>';

            let container = document.getElementById('dynamic-calendar-container');
            if (container) container.innerHTML = html;
        }

        // Render on load
        renderCalendar();
        // Re-render every hour to keep dates fresh
        setInterval(renderCalendar, 3600000);
    })();
    </script>


        window.parseInvestingData = function() {
            try {
                const raw = document.getElementById('investingPaste').value.trim();
                if (!raw) { alert('Please paste calendar data first.'); return; }
                const lines = raw.split('\n').filter(l => l.trim());
                let parsed = [];
                lines.forEach(line => {
                    let parts = line.split('|').map(p => p.trim());
                    if (parts.length < 4) parts = line.split('\t').map(p => p.trim());
                    if (parts.length >= 4) {
                        parsed.push({ time: parts[0]||'', country: parts[1]||'', event: parts[2]||'', impact: parts[3]||'', actual: parts[4]||'', forecast: parts[5]||'', previous: parts[6]||'' });
                    }
                });
                if (parsed.length === 0) { alert('Could not parse data. Use format: Time | Country | Event | Impact | Actual | Forecast | Previous'); return; }

                let detectedType = '';
                for (let row of parsed) {
                    const evt = row.event.toLowerCase();
                    if (evt.includes('nonfarm') || evt.includes('payrolls') || evt.includes('nfp')) { detectedType = 'nfp'; break; }
                    else if (evt.includes('cpi') || evt.includes('consumer price')) { detectedType = 'cpi'; break; }
                    else if (evt.includes('fomc') || evt.includes('fed interest') || evt.includes('federal funds')) { detectedType = 'fomc'; break; }
                    else if (evt.includes('retail sales')) { detectedType = 'retail'; break; }
                    else if (evt.includes('gdp')) { detectedType = 'gdp'; break; }
                    else if ((evt.includes('employment') || evt.includes('employment change')) && row.country.toLowerCase().includes('ca')) { detectedType = 'cad_emp'; break; }
                    else if (evt.includes('ecb') || (row.country.toLowerCase().includes('eu') && evt.includes('rate'))) { detectedType = 'ecb'; break; }
                    else if (evt.includes('boe') || (row.country.toLowerCase().includes('gb') && evt.includes('rate'))) { detectedType = 'boe'; break; }
                    else if (evt.includes('boj') || (row.country.toLowerCase().includes('jp') && evt.includes('rate'))) { detectedType = 'boj'; break; }
                }

                if (detectedType) {
                    document.getElementById('eventType').value = detectedType;
                    window.updatePredictionFields();
                    setTimeout(() => {
                        const config = PREDICTOR_CONFIGS[detectedType];
                        if (!config) return;
                        config.indicators.forEach(ind => {
                            const el = document.getElementById('pred_' + ind.id);
                            if (!el) return;
                            for (let row of parsed) {
                                const evt = row.event.toLowerCase();
                                const indName = ind.id.toLowerCase();
                                let match = false;
                                if (indName.includes('adp') && evt.includes('adp')) match = true;
                                else if (indName.includes('claims') && (evt.includes('jobless') || evt.includes('claims'))) match = true;
                                else if (indName.includes('ism') && evt.includes('ism')) match = true;
                                else if (indName.includes('jolts') && evt.includes('jolts')) match = true;
                                else if (indName.includes('ppi') && evt.includes('ppi')) match = true;
                                else if (indName.includes('oil') && evt.includes('oil')) match = true;
                                else if (indName.includes('import') && evt.includes('import')) match = true;
                                else if (indName.includes('wage') && evt.includes('hourly')) match = true;
                                else if (indName.includes('fedwatch') && evt.includes('fedwatch')) match = true;
                                else if (indName.includes('consumer_conf') && (evt.includes('consumer confidence') || evt.includes('consumer sentiment'))) match = true;
                                else if (indName.includes('credit') && evt.includes('credit')) match = true;
                                else if (indName.includes('retail') && evt.includes('retail')) match = true;
                                else if (indName.includes('durable') && evt.includes('durable')) match = true;
                                else if (indName.includes('housing') && (evt.includes('housing') || evt.includes('building'))) match = true;
                                else if (indName.includes('us_nfp') && evt.includes('nonfarm')) match = true;
                                else if (indName.includes('ivey') && evt.includes('ivey')) match = true;
                                else if (indName.includes('euro_cpi') && (evt.includes('euro') && evt.includes('cpi'))) match = true;
                                else if (indName.includes('euro_gdp') && (evt.includes('euro') && evt.includes('gdp'))) match = true;
                                else if (indName.includes('uk_cpi') && (evt.includes('uk') || evt.includes('british')) && evt.includes('cpi')) match = true;
                                else if (indName.includes('uk_jobs') && (evt.includes('uk') || evt.includes('british')) && (evt.includes('employment') || evt.includes('unemployment'))) match = true;
                                else if (indName.includes('japan_cpi') && evt.includes('tokyo') && evt.includes('cpi')) match = true;

                                if (match) {
                                    if (ind.type === 'select') {
                                        const actual = parseFloat(row.actual.replace('%','').replace('K','').replace('M','').replace('B','').replace(',','').trim());
                                        const forecast = parseFloat(row.forecast.replace('%','').replace('K','').replace('M','').replace('B','').replace(',','').trim());
                                        if (!isNaN(actual) && !isNaN(forecast)) {
                                            let isInverse = evt.includes('unemployment') || evt.includes('jobless');
                                            let beat = isInverse ? (actual < forecast) : (actual > forecast);
                                            let miss = isInverse ? (actual > forecast) : (actual < forecast);
                                            for (let opt of el.options) {
                                                if (beat && opt.text.toLowerCase().includes('beat')) { el.value = opt.value; break; }
                                                if (miss && opt.text.toLowerCase().includes('miss')) { el.value = opt.value; break; }
                                            }
                                        }
                                    } else if (ind.type === 'number') {
                                        const val = parseFloat(row.actual.replace('%','').replace('K','').replace('M','').replace('B','').replace(',','').trim());
                                        if (!isNaN(val)) el.value = val;
                                    }
                                }
                            }
                        });
                        alert('Parsed ' + parsed.length + ' events. Auto-detected: ' + EVENT_NAMES[detectedType] + '. Check inputs and click Calculate.');
                    }, 100);
                } else {
                    alert('Parsed ' + parsed.length + ' events. Could not auto-detect event type. Please select manually.');
                }
            } catch (err) {
                console.error('parseInvestingData error:', err);
                alert('Error parsing data: ' + err.message);
            }
        };

        // Add spin animation style
        const style = document.createElement('style');
        style.textContent = '@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }';
        document.head.appendChild(style);
    })();
    </script>
    <script>
    // Session Clocks
    function updateSessionClocks() {
        const now = new Date();
        const utc = new Date(now.toUTCString());
        const h = utc.getUTCHours(), m = utc.getUTCMinutes(), s = utc.getUTCSeconds();
        const pad = (n) => String(n).padStart(2,'0');
        document.getElementById('utc-clock').textContent = pad(h)+':'+pad(m)+':'+pad(s);
        document.getElementById('local-clock').textContent = now.toLocaleTimeString('en-US',{hour12:false});

        function update(name, open, close, hh, mm, ss) {
            const st = document.getElementById(name+'-status');
            const tm = document.getElementById(name+'-timer');
            if(!st||!tm) return;
            const isOpen = hh>=open && hh<close;
            if(isOpen) {
                st.textContent='OPEN'; st.style.color='var(--green)';
                const rem=((close-hh-1)*3600)+((59-mm)*60)+(60-ss);
                tm.textContent='Time until close: '+Math.floor(rem/3600)+'h '+Math.floor((rem%3600)/60)+'m';
            } else {
                st.textContent='CLOSED'; st.style.color='var(--text-dim)';
                let next=open; if(hh>=close) next+=24;
                const rem=((next-hh-1)*3600)+((59-mm)*60)+(60-ss);
                tm.textContent='Time until open: '+Math.floor(rem/3600)+'h '+Math.floor((rem%3600)/60)+'m';
            }
        }
        update('asian',0,9,h,m,s);
        update('london',8,17,h,m,s);
        update('ny',13,22,h,m,s);
        const overlap = document.getElementById('overlap-status');
        if(overlap) { const o=h>=13&&h<17; overlap.textContent=o?'OPEN':'CLOSED'; overlap.style.color=o?'var(--green)':'var(--text-dim)'; }
    }
    function showToolTab(tab) {
        document.querySelectorAll('.tool-panel').forEach(p=>p.style.display='none');
        document.querySelectorAll('[id^="tool-tab-"]').forEach(b=>{b.style.borderBottomColor='transparent';b.style.color='var(--text-muted)';});
        document.getElementById('tool-panel-'+tab).style.display='block';
        const btn=document.getElementById('tool-tab-'+tab);
        btn.style.borderBottomColor='var(--red)';btn.style.color='var(--red)';
    }
    setInterval(updateSessionClocks,1000);

    // Probability Calculator
    function calcProbability() {
        let winProb = parseFloat(document.getElementById('prob-win').value)/100;
        let rr = parseFloat(document.getElementById('prob-rr').value);
        let risk = parseFloat(document.getElementById('prob-risk').value);
        if(isNaN(winProb)||isNaN(rr)||isNaN(risk)||winProb<=0||rr<=0||risk<=0) return;
        let lossProb=1-winProb;
        let ev=(winProb*rr*risk)-(lossProb*risk);
        let breakeven=1/(1+rr)*100;
        let edge=(winProb*100)-breakeven;
        let kelly=((winProb*rr-lossProb)/rr)*100;
        if(kelly<0) kelly=0; if(kelly>25) kelly=25;
        let simWins=winProb*10, simLosses=lossProb*10;
        let grossProfit=simWins*rr*risk, grossLoss=simLosses*risk;
        let net=grossProfit-grossLoss;
        document.getElementById('prob-ev').textContent=(ev>=0?'+':'')+'$'+ev.toFixed(2);
        document.getElementById('prob-ev').style.color=ev>=0?'var(--green)':'var(--red)';
        document.getElementById('prob-be').textContent=breakeven.toFixed(1)+'%';
        document.getElementById('prob-edge').textContent=(edge>=0?'+':'')+edge.toFixed(1)+'%';
        document.getElementById('prob-edge').style.color=edge>=0?'var(--green)':'var(--red)';
        document.getElementById('prob-kelly').textContent=kelly.toFixed(1)+'%';
        document.getElementById('sim-wins').textContent=simWins.toFixed(1);
        document.getElementById('sim-losses').textContent=simLosses.toFixed(1);
        document.getElementById('sim-net').textContent=(net>=0?'+':'')+'$'+net.toFixed(0);
        document.getElementById('sim-net').style.color=net>=0?'var(--green)':'var(--red)';
    }
    calcProbability();
    </script>


        .journal-stat-box .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .journal-stat-box.green { border-color: rgba(16, 185, 129, 0.3); }
        .journal-stat-box.green .value { color: var(--green); }
        .journal-stat-box.red { border-color: rgba(239, 68, 68, 0.3); }
        .journal-stat-box.red .value { color: var(--red); }
        .journal-stat-box.blue { border-color: rgba(6, 182, 212, 0.3); }
        .journal-stat-box.blue .value { color: var(--red); }
        .journal-stat-box.gold { border-color: rgba(245, 158, 11, 0.3); }

        }
        .check-item.checked { opacity: 0.5; text-decoration: line-through; }
        .week-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }
        .day-box {
            background: var(--bg-input);

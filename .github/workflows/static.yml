    <script>
        // ==================== PAGE NAVIGATION ====================
        function showPage(pageId) {
            sessionStorage.setItem('currentPage', pageId);
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            let pageEl = document.getElementById('page-' + pageId);
            if (pageEl) pageEl.style.display = 'block';
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            let navLinks = document.querySelectorAll('.nav-links a');
            navLinks.forEach(a => {
                if (a.getAttribute('onclick') && a.getAttribute('onclick').includes("showPage('" + pageId + "')")) {
                    a.classList.add('active');
                }
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelector('.nav-links').classList.remove('active');
            if (pageId === 'trading') {
                setTimeout(() => { initCalc(); initFilters(); }, 100);
            }
        }

        function restorePage() {
            let savedPage = sessionStorage.getItem('currentPage');
            if (savedPage && document.getElementById('page-' + savedPage)) {
                showPage(savedPage);
                // Restore trading sub-tab if on trading page
                if (savedPage === 'trading') {
                    let savedTab = sessionStorage.getItem('tradingTab');
                    if (savedTab && document.getElementById(savedTab)) {
                        document.querySelectorAll('.app-panel').forEach(p => p.classList.remove('active'));
                        document.querySelectorAll('.app-tab').forEach(b => b.classList.remove('active'));
                        document.getElementById(savedTab).classList.add('active');
                        let tabBtn = document.querySelector('.app-tab[onclick*="' + savedTab + '"]');
                        if (tabBtn) tabBtn.classList.add('active');
                        if (savedTab === 'journal') {
                            // Also restore journal sub-tab
                            let savedJournalTab = sessionStorage.getItem('journalTab');
                            if (savedJournalTab && document.getElementById(savedJournalTab)) {
                                document.querySelectorAll('.journal-panel').forEach(p => p.classList.remove('active'));
                                document.querySelectorAll('.journal-tab').forEach(b => b.classList.remove('active'));
                                document.getElementById(savedJournalTab).classList.add('active');
                                let jBtn = document.querySelector('.journal-tab[onclick*="' + savedJournalTab + '"]');
                                if (jBtn) jBtn.classList.add('active');
                                if (savedJournalTab === 'j-dashboard') updateDashboard();
                                if (savedJournalTab === 'j-trades') renderTrades();
                                if (savedJournalTab === 'j-calendar') renderCalendar();
                                if (savedJournalTab === 'j-analysis') renderAnalysis();
                                if (savedJournalTab === 'j-challenge') renderChallenge();
                                if (savedJournalTab === 'j-risk') renderRiskPanel();
                            } else {
                                updateDashboard();
                            }
                        }
                        if (savedTab === 'calculator') setTimeout(calcProfitability, 100);
                    }
                }
            }
        }
        function toggleMobileNav() {
            let nav = document.querySelector('.nav-links');
            nav.classList.toggle('active');
        }

        // ==================== MARKET PAIRS MANAGEMENT ====================
        let allMarketData = [
            { pair: 'XAU/USD', name: 'Gold', price: 2352.64, change: 0.68, up: true },
            { pair: 'EUR/USD', name: 'Euro / Dollar', price: 1.08245, change: -0.21, up: false },
            { pair: 'GBP/USD', name: 'British Pound', price: 1.26583, change: 0.32, up: true },
            { pair: 'USD/JPY', name: 'US Dollar / Yen', price: 156.892, change: -0.13, up: false },
            { pair: 'AUD/USD', name: 'Aussie / Dollar', price: 0.67321, change: 0.15, up: true },
            { pair: 'USD/CAD', name: 'Dollar / Loonie', price: 1.36452, change: -0.08, up: false },
        ];

        let displayedPairs = ['XAUUSD', 'EURUSD', 'GBPUSD', 'USDJPY', 'AUDUSD', 'USDCAD'];

        function addMarketPair(value) {
            if (!value) return;
            let [pairCode, name] = value.split('|');
            let pairKey = pairCode.replace('USD', '/USD').replace('EUR', 'EUR/').replace('GBP', 'GBP/').replace('JPY', '/JPY').replace('CAD', '/CAD').replace('CHF', '/CHF').replace('AUD', 'AUD/').replace('NZD', 'NZD/').replace('XAU', 'XAU/').replace('XAG', 'XAG/');
            // Fix the pair format
            if (pairCode.startsWith('USD') && pairCode !== 'USDCAD' && pairCode !== 'USDCHF' && pairCode !== 'USDJPY') {
                pairKey = pairCode.slice(0, 3) + '/' + pairCode.slice(3);
            } else if (!pairCode.startsWith('XAU') && !pairCode.startsWith('XAG') && !pairCode.startsWith('EUR') && !pairCode.startsWith('GBP') && !pairCode.startsWith('AUD') && !pairCode.startsWith('NZD') && !pairCode.startsWith('CAD') && !pairCode.startsWith('CHF')) {
                pairKey = pairCode.slice(0, 3) + '/' + pairCode.slice(3);
            } else {
                pairKey = pairCode.slice(0, 3) + '/' + pairCode.slice(3);
            }

            let existing = allMarketData.find(m => m.pair === pairKey);
            if (!existing) {
                let price = 1.0 + Math.random() * 2;
                let change = (Math.random() - 0.5) * 1.5;
                allMarketData.push({
                    pair: pairKey,
                    name: name,
                    price: price,
                    change: parseFloat(change.toFixed(2)),
                    up: change >= 0
                });
            }

            if (!displayedPairs.includes(pairCode)) {
                displayedPairs.push(pairCode);
            }

            document.getElementById('add-pair-select').value = '';
            renderMarkets();
        }

        function showAllMarkets() {
            let allPairs = [
                { code: 'XAUUSD', name: 'Gold' },
                { code: 'EURUSD', name: 'Euro / Dollar' },
                { code: 'GBPUSD', name: 'British Pound' },
                { code: 'USDJPY', name: 'US Dollar / Yen' },
                { code: 'AUDUSD', name: 'Aussie / Dollar' },
                { code: 'USDCAD', name: 'Dollar / Loonie' },
                { code: 'USDCHF', name: 'Dollar / Franc' },
                { code: 'NZDUSD', name: 'Kiwi / Dollar' },
                { code: 'EURGBP', name: 'Euro / Pound' },
                { code: 'GBPJPY', name: 'Pound / Yen' },
                { code: 'EURJPY', name: 'Euro / Yen' },
                { code: 'AUDJPY', name: 'Aussie / Yen' },
                { code: 'CADJPY', name: 'Loonie / Yen' },
                { code: 'CHFJPY', name: 'Franc / Yen' },
                { code: 'EURAUD', name: 'Euro / Aussie' },
                { code: 'GBPAUD', name: 'Pound / Aussie' },
                { code: 'XAGUSD', name: 'Silver' }
            ];

            displayedPairs = allPairs.map(p => p.code);

            allPairs.forEach(p => {
                let pairKey = p.code.slice(0, 3) + '/' + p.code.slice(3);
                let existing = allMarketData.find(m => m.pair === pairKey);
                if (!existing) {
                    let price = p.code === 'XAUUSD' ? 2350 + Math.random() * 50 : 
                               p.code === 'XAGUSD' ? 28 + Math.random() * 2 :
                               p.code === 'USDJPY' ? 150 + Math.random() * 10 :
                               p.code.includes('JPY') ? 100 + Math.random() * 100 :
                               0.5 + Math.random() * 2;
                    let change = (Math.random() - 0.5) * 1.5;
                    allMarketData.push({
                        pair: pairKey,
                        name: p.name,
                        price: parseFloat(price.toFixed(p.code === 'XAUUSD' || p.code === 'XAGUSD' ? 2 : 5)),
                        change: parseFloat(change.toFixed(2)),
                        up: change >= 0
                    });
                }
            });

            renderMarkets();
        }

        // ==================== PROFITABILITY & WIN RATE CALCULATOR ====================
        function calcProfitability() {
            let rr = parseFloat(document.getElementById('prof-rr').value) || 2;
            let winRate = parseFloat(document.getElementById('prof-win').value) || 50;
            let risk = parseFloat(document.getElementById('prof-risk').value) || 100;
            let trades = parseInt(document.getElementById('prof-trades').value) || 100;

            let lossRate = 100 - winRate;
            let breakeven = (1 / (1 + rr)) * 100;
            let ev = ((winRate/100) * rr * risk) - ((lossRate/100) * risk);
            let totalEV = ev * trades;
            let pf = lossRate > 0 ? ((winRate/100) * rr * risk * trades) / ((lossRate/100) * risk * trades) : 999;

            // Update matrix
            updateProfitMatrix(rr, winRate);

            // Update results
            document.getElementById('prof-breakeven').textContent = breakeven.toFixed(1) + '%';
            document.getElementById('prof-ev').textContent = (ev >= 0 ? '+' : '') + '$' + ev.toFixed(2);
            document.getElementById('prof-ev').style.color = ev >= 0 ? 'var(--green)' : 'var(--red)';
            document.getElementById('prof-total').textContent = (totalEV >= 0 ? '+' : '') + '$' + totalEV.toFixed(0);
            document.getElementById('prof-total').style.color = totalEV >= 0 ? 'var(--green)' : 'var(--red)';
            document.getElementById('prof-pf').textContent = pf >= 999 ? '∞' : pf.toFixed(2);
            document.getElementById('prof-pf').style.color = pf >= 2 ? 'var(--green)' : (pf >= 1 ? 'var(--gold)' : 'var(--red)');

            // Status
            let status = document.getElementById('prof-status');
            if (winRate > breakeven + 5) {
                status.textContent = '✅ PROFITABLE';
                status.style.color = 'var(--green)';
                status.style.background = 'var(--green-dim)';
            } else if (winRate > breakeven) {
                status.textContent = '⚠️ BREAK EVEN +';
                status.style.color = 'var(--gold)';
                status.style.background = 'var(--gold-dim)';
            } else {
                status.textContent = '❌ NOT PROFITABLE';
                status.style.color = 'var(--red)';
                status.style.background = 'var(--red-dim)';
            }
        }

        function updateProfitMatrix(activeRR, activeWin) {
            let rrValues = [1, 2, 3, 4, 5];
            let winValues = [20, 30, 40, 50, 60];

            rrValues.forEach((rr, ri) => {
                winValues.forEach((win, wi) => {
                    let cell = document.getElementById('pm-' + rr + '-' + win);
                    if (!cell) return;
                    let be = (1 / (1 + rr)) * 100;
                    let isActive = (rr === activeRR && win === activeWin);

                    if (win < be - 2) {
                        cell.textContent = 'LOSS';
                        cell.style.background = 'rgba(220, 38, 38, 0.6)';
                        cell.style.color = '#fff';
                    } else if (win >= be - 2 && win <= be + 2) {
                        cell.textContent = 'BREAK EVEN';
                        cell.style.background = 'rgba(100, 100, 100, 0.5)';
                        cell.style.color = '#fff';
                    } else {
                        cell.textContent = 'PROFIT';
                        cell.style.background = 'rgba(16, 185, 129, 0.6)';
                        cell.style.color = '#fff';
                    }

                    if (isActive) {
                        cell.style.boxShadow = '0 0 0 2px var(--red)';
                        cell.style.fontWeight = '900';
                    } else {
                        cell.style.boxShadow = 'none';
                        cell.style.fontWeight = '700';
                    }
                });
            });
        }

        // ==================== LIVE MARKETS ====================
        const marketData = [
            { pair: 'XAU/USD', name: 'Gold', price: 2352.64, change: 0.68, up: true },
            { pair: 'EUR/USD', name: 'Euro / Dollar', price: 1.08245, change: -0.21, up: false },
            { pair: 'GBP/USD', name: 'British Pound', price: 1.26583, change: 0.32, up: true },
            { pair: 'USD/JPY', name: 'US Dollar / Yen', price: 156.892, change: -0.13, up: false },
            { pair: 'AUD/USD', name: 'Aussie / Dollar', price: 0.67321, change: 0.15, up: true },
            { pair: 'USD/CAD', name: 'Dollar / Loonie', price: 1.36452, change: -0.08, up: false },
        ];

        function generateChartBars(up) {
            let bars = '';
            let color = up ? 'var(--green)' : 'var(--red)';
            for (let i = 0; i < 20; i++) {
                let h = 20 + Math.random() * 60;
                bars += `<div class="chart-bar" style="height:${h}%; background:${color}; opacity:${0.3 + Math.random() * 0.7};"></div>`;
            }
            return bars;
        }

        function renderMarkets() {
            let grid = document.getElementById('markets-grid');
            if (!grid) return;
            let visibleData = allMarketData.filter(m => {
                let code = m.pair.replace('/', '');
                return displayedPairs.includes(code);
            });
            grid.innerHTML = visibleData.map(m => {
                let tvSymbol = m.pair.replace('/', '');
                if (tvSymbol === 'XAUUSD') tvSymbol = 'OANDA:XAUUSD';
                else if (tvSymbol === 'XAGUSD') tvSymbol = 'OANDA:XAGUSD';
                else tvSymbol = 'OANDA:' + tvSymbol;
                let changeClass = m.up ? 'up' : 'down';
                let changeSign = m.up ? '+' : '';
                return '<a href="https://www.tradingview.com/chart/?symbol=' + tvSymbol + '" target="_blank" class="market-card-link">' +
                '<div class="market-card">' +
                    '<div class="market-header">' +
                        '<div>' +
                            '<div class="market-name">' + m.pair + '</div>' +
                            '<div class="market-sub">' + m.name + '</div>' +
                        '</div>' +
                        '<div class="market-change ' + changeClass + '">' + changeSign + m.change + '%</div>' +
                    '</div>' +
                    '<div class="market-price">' + m.price.toLocaleString() + '</div>' +
                    '<div class="market-chart">' + generateChartBars(m.up) + '</div>' +
                    '<div class="market-open-chart">📈 Open Chart →</div>' +
                '</div>' +
            '</a>';
            }).join('');
        }
        renderMarkets();
        setInterval(renderMarkets, 5000);

        // ==================== APP TABS ====================
        function showAppTab(tabId) {
            sessionStorage.setItem('tradingTab', tabId);
            document.querySelectorAll('.app-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.app-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            if (tabId === 'journal') updateDashboard();
            if (tabId === 'calculator') setTimeout(calcProfitability, 100);
        }

        // ==================== CALCULATOR ====================
        const pairs = [
            {value:"EURUSD", base:"EUR", quote:"USD", pip:0.0001, defaultPrice:1.08500},
            {value:"GBPUSD", base:"GBP", quote:"USD", pip:0.0001, defaultPrice:1.27000},
            {value:"USDJPY", base:"USD", quote:"JPY", pip:0.01, defaultPrice:150.000},
            {value:"USDCHF", base:"USD", quote:"CHF", pip:0.0001, defaultPrice:0.89000},
            {value:"AUDUSD", base:"AUD", quote:"USD", pip:0.0001, defaultPrice:0.65000},
            {value:"NZDUSD", base:"NZD", quote:"USD", pip:0.0001, defaultPrice:0.61000},
            {value:"USDCAD", base:"USD", quote:"CAD", pip:0.0001, defaultPrice:1.35000},
            {value:"EURGBP", base:"EUR", quote:"GBP", pip:0.0001, defaultPrice:0.85000},
            {value:"EURJPY", base:"EUR", quote:"JPY", pip:0.01, defaultPrice:162.500},
            {value:"GBPJPY", base:"GBP", quote:"JPY", pip:0.01, defaultPrice:190.000},
            {value:"CHFJPY", base:"CHF", quote:"JPY", pip:0.01, defaultPrice:168.000},
            {value:"AUDJPY", base:"AUD", quote:"JPY", pip:0.01, defaultPrice:97.000},
            {value:"CADJPY", base:"CAD", quote:"JPY", pip:0.01, defaultPrice:111.000},
            {value:"NZDJPY", base:"NZD", quote:"JPY", pip:0.01, defaultPrice:91.000},
            {value:"EURCHF", base:"EUR", quote:"CHF", pip:0.0001, defaultPrice:0.94000},
            {value:"GBPCHF", base:"GBP", quote:"CHF", pip:0.0001, defaultPrice:1.10000},
            {value:"AUDCHF", base:"AUD", quote:"CHF", pip:0.0001, defaultPrice:0.58000},
            {value:"CADCHF", base:"CAD", quote:"CHF", pip:0.0001, defaultPrice:0.66000},
            {value:"EURAUD", base:"EUR", quote:"AUD", pip:0.0001, defaultPrice:1.66000},
            {value:"GBPAUD", base:"GBP", quote:"AUD", pip:0.0001, defaultPrice:1.95000},
            {value:"EURCAD", base:"EUR", quote:"CAD", pip:0.0001, defaultPrice:1.46000},
            {value:"GBPCAD", base:"GBP", quote:"CAD", pip:0.0001, defaultPrice:1.72000},
            {value:"AUDNZD", base:"AUD", quote:"NZD", pip:0.0001, defaultPrice:1.07000},
            {value:"XAUUSD", base:"XAU", quote:"USD", pip:0.01, defaultPrice:2400.00, isMetal:true},
            {value:"XAGUSD", base:"XAG", quote:"USD", pip:0.01, defaultPrice:28.000, isMetal:true},
        ];

        const symbols = {USD:"$", EUR:"€", GBP:"£", JPY:"¥", CHF:"Fr", AUD:"A$", CAD:"C$", NZD:"NZ$"};
        const CONTRACT_SIZE = 100000;
        const METAL_CONTRACT_SIZE = 100;

        
        function initCalc() {
            let pairSelect = document.getElementById('currencyPair');
            if (!pairSelect) return;
            pairSelect.innerHTML = '';
            pairs.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.value;
                opt.textContent = p.value;
                pairSelect.appendChild(opt);
            });
            pairSelect.value = "EURUSD";

            ['balance','accountCurrency','riskSlider','stopLoss','takeProfit','entryPrice','currencyPair','leverage','conversionRate'].forEach(id => {
                const el = document.getElementById(id);
                if (el) { el.addEventListener('input', calculate); el.addEventListener('change', calculate); }
            });
            calculate();
        }

        function getPair() { return pairs.find(p => p.value === document.getElementById('currencyPair').value); }
        function getSymbol(c) { return symbols[c] || c; }

        function setRisk(val) {
            document.getElementById('riskSlider').value = val;
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.toggle('active', Math.abs(parseFloat(btn.textContent) - val) < 0.05);
            });
            calculate();
        }

        function needsConversionRate(pair, acc) {
            if (!pair) return false;
            if (pair.quote === acc) return false;
            if (pair.base === acc && !pair.isMetal) return false;
            return true;
        }

        function getPipValuePerLot(pair, acc, entryPrice, convRate) {
            if (!pair) return 0;
            const lotSize = pair.isMetal ? METAL_CONTRACT_SIZE : CONTRACT_SIZE;
            const pipValueQuote = pair.pip * lotSize;
            if (pair.quote === acc) return pipValueQuote;
            if (pair.base === acc && !pair.isMetal) return pipValueQuote / entryPrice;
            if (convRate > 0) return pipValueQuote * convRate;
            return 0;
        }

        function getMargin(pair, acc, entryPrice, lots, leverage, convRate) {
            if (!pair) return 0;
            const lotSize = pair.isMetal ? METAL_CONTRACT_SIZE : CONTRACT_SIZE;
            const units = lots * lotSize;
            const marginBase = units / leverage;
            if (pair.base === acc) return marginBase;
            if (pair.quote === acc) return marginBase * entryPrice;
            if (convRate > 0) return marginBase * entryPrice * convRate;
            return marginBase * entryPrice;
        }

        function formatMoney(value, currency) { return getSymbol(currency) + value.toFixed(2); }

        function calculate() {
            const balance = parseFloat(document.getElementById('balance').value) || 0;
            const acc = document.getElementById('accountCurrency').value;
            const riskPct = parseFloat(document.getElementById('riskSlider').value) || 0;
            const sl = parseFloat(document.getElementById('stopLoss').value) || 0;
            const tp = parseFloat(document.getElementById('takeProfit').value) || 0;
            const entry = parseFloat(document.getElementById('entryPrice').value) || 0;
            const lev = parseInt(document.getElementById('leverage').value) || 100;
            const pair = getPair();
            const convRate = parseFloat(document.getElementById('conversionRate').value) || 0;

            document.getElementById('riskDisplay').textContent = riskPct.toFixed(1) + '%';
            document.getElementById('riskPercentDisplay').textContent = riskPct.toFixed(1) + '%';

            document.querySelectorAll('.preset-btn').forEach(btn => {
                const btnRisk = parseFloat(btn.textContent);
                btn.classList.toggle('active', Math.abs(btnRisk - riskPct) < 0.05);
            });

            const convContainer = document.getElementById('conversionRateContainer');
            if (needsConversionRate(pair, acc)) {
                convContainer.classList.remove('hidden');
                document.getElementById('conversionRateLabel').textContent = pair.quote + '/' + acc + ' Exchange Rate';
                document.getElementById('conversionRateHint').textContent = 'Enter how many ' + acc + ' per 1 ' + pair.quote + '.';
            } else {
                convContainer.classList.add('hidden');
            }

            if (!pair || balance <= 0 || sl <= 0 || entry <= 0) { clearResults(acc); return; }

            const riskAmount = balance * (riskPct / 100);
            const pipValuePerLot = getPipValuePerLot(pair, acc, entry, convRate);

            if (pipValuePerLot <= 0) { clearResults(acc); return; }

            const lots = riskAmount / (sl * pipValuePerLot);
            const lotSize = pair.isMetal ? METAL_CONTRACT_SIZE : CONTRACT_SIZE;
            const units = lots * lotSize;
            const valuePerPip = lots * pipValuePerLot;

            const stdLots = Math.floor(lots);
            const remAfterStd = lots - stdLots;
            const miniLotsCount = Math.floor(remAfterStd / 0.1);
            const remAfterMini = remAfterStd - (miniLotsCount * 0.1);
            const microLotsCount = Math.round(remAfterMini / 0.01);

            const margin = getMargin(pair, acc, entry, lots, lev, convRate);

            let riskReward = '—', potentialProfit = '—';
            if (tp > 0) {
                riskReward = '1:' + (tp / sl).toFixed(1);
                potentialProfit = formatMoney(tp * valuePerPip, acc);
            }

            const riskBarWidth = Math.min((riskPct / 10) * 100, 100);
            document.getElementById('riskBar').style.width = riskBarWidth + '%';

            document.getElementById('lotSize').textContent = lots.toFixed(2);
            document.getElementById('units').textContent = Math.floor(units).toLocaleString();
            document.getElementById('riskAmount').textContent = formatMoney(riskAmount, acc);
            document.getElementById('stdLots').textContent = stdLots.toFixed(2);
            document.getElementById('miniLots').textContent = (miniLotsCount * 0.1).toFixed(2);
            document.getElementById('microLots').textContent = (microLotsCount * 0.01).toFixed(2);
            document.getElementById('pipValue').textContent = formatMoney(pipValuePerLot, acc);
            document.getElementById('valuePerPip').textContent = formatMoney(valuePerPip, acc);
            document.getElementById('slDistance').textContent = sl + ' pips';
            document.getElementById('riskReward').textContent = riskReward;
            document.getElementById('maxLoss').textContent = formatMoney(riskAmount, acc);
            document.getElementById('potentialProfit').textContent = potentialProfit;
            document.getElementById('marginRequired').textContent = formatMoney(margin, acc);
            document.getElementById('remainingBalance').textContent = formatMoney(balance - riskAmount, acc);
        }

        function clearResults(acc) {
            document.getElementById('lotSize').textContent = '0.00';
            document.getElementById('units').textContent = '0';
            document.getElementById('riskAmount').textContent = formatMoney(0, acc);
            document.getElementById('stdLots').textContent = '0.00';
            document.getElementById('miniLots').textContent = '0.00';
            document.getElementById('microLots').textContent = '0.00';
            document.getElementById('pipValue').textContent = formatMoney(0, acc);
            document.getElementById('valuePerPip').textContent = formatMoney(0, acc);
            document.getElementById('riskReward').textContent = '—';
            document.getElementById('maxLoss').textContent = formatMoney(0, acc);
            document.getElementById('potentialProfit').textContent = '—';
            document.getElementById('marginRequired').textContent = formatMoney(0, acc);
            document.getElementById('remainingBalance').textContent = formatMoney(parseFloat(document.getElementById('balance').value) || 0, acc);
            document.getElementById('riskBar').style.width = '0%';
        }

        // ==================== MULTI-ACCOUNT SYSTEM ====================
        let accounts = JSON.parse(localStorage.getItem('forex_journal_accounts') || '[]');
        let currentAccountId = localStorage.getItem('forex_journal_current_account') || null;

        function getAccounts() {
            return JSON.parse(localStorage.getItem('forex_journal_accounts') || '[]');
        }
        function saveAccounts(accs) {
            localStorage.setItem('forex_journal_accounts', JSON.stringify(accs));
            accounts = accs;
        }
        function getCurrentAccount() {
            let accs = getAccounts();
            return accs.find(a => a.id == currentAccountId) || accs[0] || null;
        }
        function setCurrentAccount(id) {
            currentAccountId = id;
            localStorage.setItem('forex_journal_current_account', id);
        }
        function getAccountById(id) {
            return getAccounts().find(a => a.id == id);
        }
        function getAccountDisplayName(acc) {
            if (!acc) return 'Unknown';
            let sym = acc.currency === 'USD' ? '$' : acc.currency === 'EUR' ? '€' : '£';
            let name = acc.name || 'Account';
            if (acc.type === 'funded') {
                let steps = acc.steps || 2;
                let phase = acc.phase === '1' ? 'S1' : acc.phase === '2' ? 'S2' : 'S3';
                let status = acc.status === 'passed' ? '✅' : acc.status === 'failed' ? '❌' : '🟡';
                return name + ' | ' + sym + acc.balance.toLocaleString() + ' | ' + steps + '-Step ' + phase + ' ' + status;
            }
            return name + ' | ' + sym + acc.balance.toLocaleString();
        }
        function getAccountShortLabel(acc) {
            if (!acc) return 'Unknown';
            let sym = acc.currency === 'USD' ? '$' : acc.currency === 'EUR' ? '€' : '£';
            let name = acc.name || 'Account';
            if (acc.type === 'funded') {
                let phase = acc.phase === '1' ? 'S1' : acc.phase === '2' ? 'S2' : 'S3';
                return name + ' — ' + sym + acc.balance.toLocaleString() + ' (' + (acc.provider || 'Funded') + ' ' + phase + ')';
            }
            return name + ' — ' + sym + acc.balance.toLocaleString();
        }

        function renderAccountList() {
            let accs = getAccounts();
            let list = document.getElementById('account-list');
            if (!list) return;
            if (accs.length === 0) {
                list.innerHTML = '<p style="color:var(--text-muted); padding:20px;">No accounts yet. Click "Add Account" to get started.</p>';
                return;
            }
            list.innerHTML = accs.map(acc => {
                let isCurrent = acc.id == currentAccountId;
                let sym = acc.currency === 'USD' ? '$' : acc.currency === 'EUR' ? '€' : '£';
                let statusEmoji = acc.status === 'passed' ? '✅' : acc.status === 'failed' ? '❌' : '🟡';
                let typeEmoji = acc.type === 'funded' ? '🏢' : '👤';
                return `<div style="display:flex; align-items:center; gap:12px; padding:14px; background:var(--bg-input); border:1px solid ${isCurrent ? 'var(--red)' : 'var(--border)'}; border-radius:14px; cursor:pointer; transition:all 0.2s;" onclick="selectAccountFromList(${acc.id})" onmouseover="this.style.borderColor='var(--red)'" onmouseout="this.style.borderColor='${isCurrent ? 'var(--red)' : 'var(--border)'}'">
                    <div style="font-size:1.5rem;">${typeEmoji}</div>
                    <div style="flex:1; text-align:left;">
                        <div style="font-weight:700; font-size:0.95rem; color:var(--text);">${acc.name || 'Account'}</div>
                        <div style="font-size:0.8rem; color:var(--text-muted); margin-top:2px;">${sym}${acc.balance.toLocaleString()} · ${acc.type === 'funded' ? (acc.provider || 'Funded') + ' ' + (acc.steps || 2) + '-Step' : 'Personal'} ${statusEmoji}</div>
                    </div>
                    <div style="display:flex; gap:6px;">
                        ${isCurrent ? '<span style="padding:4px 10px; background:var(--red); color:white; border-radius:6px; font-size:0.75rem; font-weight:700;">ACTIVE</span>' : '<span style="padding:4px 10px; background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted); border-radius:6px; font-size:0.75rem; font-weight:600;">Select</span>'}
                        <button onclick="event.stopPropagation(); editAccount(${acc.id})" style="padding:6px 10px; background:var(--bg-card); border:1px solid var(--border); border-radius:6px; color:var(--text-muted); cursor:pointer; font-size:0.75rem;">✏️</button>
                        <button onclick="event.stopPropagation(); deleteAccount(${acc.id})" style="padding:6px 10px; background:var(--bg-card); border:1px solid var(--border); border-radius:6px; color:var(--red); cursor:pointer; font-size:0.75rem;">🗑️</button>
                    </div>
                </div>`;
            }).join('');
        }

        function selectAccountFromList(id) {
            setCurrentAccount(id);
            renderAccountList();
            renderAccountSelector();
            updateAccountBadge();
            updateDashboard();
            renderTrades();
            renderChallenge();
            renderRiskPanel();
            closeAccountSetup();
        }

        function renderAccountSelector() {
            let sel = document.getElementById('account-selector');
            let tAcc = document.getElementById('t-account-id');
            let accs = getAccounts();
            if (sel) {
                sel.innerHTML = accs.map(a => `<option value="${a.id}" ${a.id == currentAccountId ? 'selected' : ''}>${getAccountShortLabel(a)}</option>`).join('');
            }
            if (tAcc) {
                tAcc.innerHTML = accs.map(a => `<option value="${a.id}" ${a.id == currentAccountId ? 'selected' : ''}>${getAccountShortLabel(a)}</option>`).join('');
                updateTradeAccountInfo();
            }
        }

        function updateAccountBadge() {
            let badge = document.getElementById('account-badge');
            let acc = getCurrentAccount();
            if (!badge || !acc) return;
            if (acc.type === 'funded') {
                let status = acc.status === 'passed' ? '✅ Passed' : acc.status === 'failed' ? '❌ Failed' : '🟡 Active';
                badge.textContent = '🏢 ' + (acc.provider || 'Funded') + ' — ' + status;
                badge.style.background = acc.status === 'passed' ? 'var(--green-dim)' : acc.status === 'failed' ? 'var(--red-dim)' : 'var(--gold-dim)';
                badge.style.color = acc.status === 'passed' ? 'var(--green)' : acc.status === 'failed' ? 'var(--red)' : 'var(--gold)';
            } else {
                badge.textContent = '👤 Personal Account';
                badge.style.background = 'var(--green-dim)';
                badge.style.color = 'var(--green)';
            }
        }

        function switchAccount(id) {
            setCurrentAccount(id);
            updateAccountBadge();
            updateDashboard();
            renderTrades();
            renderChallenge();
            renderRiskPanel();
            renderCalendar();
            updateTradeAccountInfo();
        }

        function showAddAccountForm() {
            document.getElementById('add-account-form').style.display = 'flex';
            setNewAccountType('personal');
            document.getElementById('new-acc-name').value = 'My Account';
            document.getElementById('new-acc-balance').value = 5000;
            document.getElementById('new-acc-currency').value = 'USD';
            document.getElementById('new-acc-provider').value = 'FTMO';
            document.getElementById('new-acc-steps').value = 2;
            document.getElementById('new-acc-phase').value = 1;
            document.getElementById('new-target-1').value = 10;
            document.getElementById('new-target-2').value = 5;
            document.getElementById('new-target-3').value = 0;
            document.getElementById('new-acc-status').value = 'active';
            updateNewStepTargets();
        }
        function closeAddAccountForm() {
            document.getElementById('add-account-form').style.display = 'none';
        }
        function setNewAccountType(type) {
            document.getElementById('new-type-personal').style.background = type === 'personal' ? 'var(--red)' : 'transparent';
            document.getElementById('new-type-personal').style.color = type === 'personal' ? 'white' : 'var(--text-muted)';
            document.getElementById('new-type-funded').style.background = type === 'funded' ? 'var(--gold)' : 'transparent';
            document.getElementById('new-type-funded').style.color = type === 'funded' ? 'white' : 'var(--text-muted)';
            document.getElementById('new-funded-fields').style.display = type === 'funded' ? 'block' : 'none';
        }
        function updateNewStepTargets() {
            let steps = parseInt(document.getElementById('new-acc-steps').value) || 2;
            let box = document.getElementById('new-target-3-box');
            if (box) box.style.display = steps >= 3 ? 'block' : 'none';
        }
        function setNewTargets(t1, t2, t3) {
            document.getElementById('new-target-1').value = t1;
            document.getElementById('new-target-2').value = t2;
            document.getElementById('new-target-3').value = t3;
        }
        function saveNewAccount() {
            let acc = {
                id: Date.now(),
                name: document.getElementById('new-acc-name').value || 'My Account',
                balance: parseFloat(document.getElementById('new-acc-balance').value) || 5000,
                currency: document.getElementById('new-acc-currency').value || 'USD',
                type: document.getElementById('new-type-personal').style.background.includes('red') || document.getElementById('new-type-personal').style.backgroundColor === 'rgb(220, 38, 38)' ? 'personal' : 'funded',
                provider: document.getElementById('new-acc-provider').value || 'FTMO',
                steps: parseInt(document.getElementById('new-acc-steps').value) || 2,
                phase: document.getElementById('new-acc-phase').value || '1',
                target1: parseFloat(document.getElementById('new-target-1').value) || 10,
                target2: parseFloat(document.getElementById('new-target-2').value) || 5,
                target3: parseFloat(document.getElementById('new-target-3').value) || 0,
                status: document.getElementById('new-acc-status').value || 'active',
                startDate: new Date().toISOString().split('T')[0]
            };
            // Check which button is actually active
            let pBtn = document.getElementById('new-type-personal');
            let fBtn = document.getElementById('new-type-funded');
            if (pBtn && fBtn) {
                let pActive = pBtn.style.background.includes('linear-gradient') || pBtn.style.backgroundColor === 'rgb(220, 38, 38)' || getComputedStyle(pBtn).backgroundColor === 'rgb(220, 38, 38)';
                acc.type = pActive ? 'personal' : 'funded';
            }
            let accs = getAccounts();
            accs.push(acc);
            saveAccounts(accs);
            if (!currentAccountId) setCurrentAccount(acc.id);
            renderAccountList();
            renderAccountSelector();
            updateAccountBadge();
            closeAddAccountForm();
            updateDashboard();
            renderChallenge();
            renderRiskPanel();
        }
        function deleteAccount(id) {
            if (!confirm('Delete this account and all its trades? This cannot be undone!')) return;
            let accs = getAccounts().filter(a => a.id != id);
            saveAccounts(accs);
            trades = trades.filter(t => t.accountId != id);
            localStorage.setItem('forex_journal_trades', JSON.stringify(trades));
            if (currentAccountId == id) {
                currentAccountId = accs.length > 0 ? accs[0].id : null;
                localStorage.setItem('forex_journal_current_account', currentAccountId);
            }
            renderAccountList();
            renderAccountSelector();
            updateAccountBadge();
            updateDashboard();
            renderTrades();
            renderChallenge();
        }
        function editAccount(id) {
            let acc = getAccountById(id);
            if (!acc) return;
            // Populate edit form (reuse add form for simplicity)
            document.getElementById('new-acc-name').value = acc.name || 'Account';
            document.getElementById('new-acc-balance').value = acc.balance;
            document.getElementById('new-acc-currency').value = acc.currency || 'USD';
            setNewAccountType(acc.type);
            if (acc.type === 'funded') {
                document.getElementById('new-acc-provider').value = acc.provider || 'FTMO';
                document.getElementById('new-acc-steps').value = acc.steps || 2;
                document.getElementById('new-acc-phase').value = acc.phase || '1';
                document.getElementById('new-target-1').value = acc.target1 || 10;
                document.getElementById('new-target-2').value = acc.target2 || 5;
                document.getElementById('new-target-3').value = acc.target3 || 0;
                document.getElementById('new-acc-status').value = acc.status || 'active';
                updateNewStepTargets();
            }
            showAddAccountForm();
            // Override the save button to update instead
            let oldSave = document.querySelector('#add-account-form button[onclick="saveNewAccount()"]');
            if (oldSave) {
                oldSave.textContent = 'Update Account';
                oldSave.setAttribute('onclick', 'updateExistingAccount(' + id + ')');
            }
        }
        function updateExistingAccount(id) {
            let accs = getAccounts();
            let idx = accs.findIndex(a => a.id == id);
            if (idx === -1) return;
            let pBtn = document.getElementById('new-type-personal');
            let fBtn = document.getElementById('new-type-funded');
            let type = 'personal';
            if (pBtn && fBtn) {
                let pActive = pBtn.style.background.includes('linear-gradient') || pBtn.style.backgroundColor === 'rgb(220, 38, 38)' || getComputedStyle(pBtn).backgroundColor === 'rgb(220, 38, 38)';
                type = pActive ? 'personal' : 'funded';
            }
            accs[idx] = {
                id: id,
                name: document.getElementById('new-acc-name').value || 'My Account',
                balance: parseFloat(document.getElementById('new-acc-balance').value) || 5000,
                currency: document.getElementById('new-acc-currency').value || 'USD',
                type: type,
                provider: document.getElementById('new-acc-provider').value || 'FTMO',
                steps: parseInt(document.getElementById('new-acc-steps').value) || 2,
                phase: document.getElementById('new-acc-phase').value || '1',
                target1: parseFloat(document.getElementById('new-target-1').value) || 10,
                target2: parseFloat(document.getElementById('new-target-2').value) || 5,
                target3: parseFloat(document.getElementById('new-target-3').value) || 0,
                status: document.getElementById('new-acc-status').value || 'active',
                startDate: accs[idx].startDate
            };
            saveAccounts(accs);
            let oldSave = document.querySelector('#add-account-form button[onclick="updateExistingAccount(' + id + ')"]');
            if (oldSave) {
                oldSave.textContent = 'Save Account';
                oldSave.setAttribute('onclick', 'saveNewAccount()');
            }
            closeAddAccountForm();
            renderAccountList();
            renderAccountSelector();
            updateAccountBadge();
            updateDashboard();
            renderChallenge();
        }
        function updateTradeAccountInfo() {
            let accId = document.getElementById('t-account-id').value;
            let acc = getAccountById(accId);
            let info = document.getElementById('trade-account-info');
            if (!acc || !info) return;
            let sym = acc.currency === 'USD' ? '$' : acc.currency === 'EUR' ? '€' : '£';
            if (acc.type === 'funded') {
                let status = acc.status === 'passed' ? '✅ Passed' : acc.status === 'failed' ? '❌ Failed' : '🟡 Active';
                info.innerHTML = `🏢 <strong>${acc.provider || 'Funded'}</strong> · ${acc.steps || 2}-Step · Phase ${acc.phase || '1'} · ${sym}${acc.balance.toLocaleString()} · ${status}`;
            } else {
                info.innerHTML = `👤 <strong>Personal Account</strong> · ${sym}${acc.balance.toLocaleString()}`;
            }
        }

        // ==================== JOURNAL ====================
        let trades = JSON.parse(localStorage.getItem('forex_journal_trades') || '[]');

        function showJournalTab(id) {
            sessionStorage.setItem('journalTab', id);
            document.querySelectorAll('.journal-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.journal-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            if (id === 'j-dashboard') updateDashboard();
            if (id === 'j-trades') renderTrades();
            if (id === 'j-calendar') renderCalendar();
            if (id === 'j-analysis') renderAnalysis();
        }

        function formatJournalMoney(n) {
            if (n === undefined || n === null) return '$0.00';
            return (n >= 0 ? '+' : '') + '$' + parseFloat(n).toFixed(2);
        }
        function formatDate(d) {
            return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        function calcRR(entry, sl, tp) {
            if (!entry || !sl || !tp) return 0;
            let risk = Math.abs(entry - sl);
            let reward = Math.abs(tp - entry);
            return risk > 0 ? (reward / risk).toFixed(2) : 0;
        }
        function calcAutoPnL(dir, entry, exit, lot, pair) {
            if (!entry || !exit || !lot) return 0;
            let pipVal = pair === 'XAUUSD' ? 0.01 : 0.0001;
            let diff = dir === 'Buy' ? (exit - entry) : (entry - exit);
            let pips = diff / pipVal;
            return parseFloat((pips * lot * 10).toFixed(2));
        }

        function toggleFundedFields() {
            let accId = document.getElementById('t-account-id').value;
            let acc = getAccountById(accId);
            let display = (acc && acc.type === 'funded') ? 'block' : 'none';
            document.getElementById('funded-provider-group').style.display = display;
            document.getElementById('funded-phase-group').style.display = display;
            document.getElementById('funded-target-group').style.display = display;
            document.getElementById('funded-status-group').style.display = display;
            if (acc && acc.type === 'funded') {
                document.getElementById('t-provider').value = acc.provider || 'FTMO';
                document.getElementById('t-phase').value = acc.phase || '1';
                document.getElementById('t-target').value = acc.target1 || 10;
                document.getElementById('t-challenge-status').value = acc.status || 'active';
            }
        }

        function selectMood(el) {
            document.querySelectorAll('.mood-option').forEach(m => m.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('t-mood').value = el.textContent;
        }
        function toggleCheck(el) {
            let cb = el.querySelector('input');
            cb.checked = !cb.checked;
            el.classList.toggle('checked', cb.checked);
        }

        function addTrade(e) {
            e.preventDefault();
            e.stopPropagation();
            e.preventDefault();
            let accId = document.getElementById('t-account-id').value;
            let acc = getAccountById(accId);
            if (!acc) { alert('Please select an account first.'); return; }
            let pair = document.getElementById('t-pair').value;
            let entry = parseFloat(document.getElementById('t-entry').value) || null;
            let exit = parseFloat(document.getElementById('t-exit').value) || null;
            let dir = document.getElementById('t-dir').value;
            let lot = parseFloat(document.getElementById('t-lot').value) || null;
            let manualPnl = document.getElementById('t-pnl').value;

            if (!manualPnl && (!entry || !exit)) {
                alert('⚠️ Please enter both Entry Price and Exit Price for auto P&L calculation.\nOr enter a manual P&L value to override.');
                return;
            }

            let pnl = manualPnl ? parseFloat(manualPnl) : (entry && exit && lot ? calcAutoPnL(dir, entry, exit, lot, pair) : 0);
            let accountType = acc.type;
            let trade = {
                id: Date.now(),
                accountId: accId,
                date: document.getElementById('t-date').value,
                pair: pair,
                direction: dir,
                strategy: document.getElementById('t-strategy').value,
                accountType: accountType,
                provider: accountType === 'funded' ? (acc.provider || 'FTMO') : null,
                phase: accountType === 'funded' ? (acc.phase || '1') : null,
                challengeTarget: accountType === 'funded' ? (acc.target1 || 10) : null,
                challengeStatus: accountType === 'funded' ? (acc.status || 'active') : null,
                entry: entry,
                sl: parseFloat(document.getElementById('t-sl').value) || null,
                tp: parseFloat(document.getElementById('t-tp').value) || null,
                exit: exit,
                lot: lot,
                risk: parseFloat(document.getElementById('t-risk').value) || null,
                rrTarget: document.getElementById('t-rr-target').value || null,
                pnl: pnl,
                rr: calcRR(entry, parseFloat(document.getElementById('t-sl').value) || null, parseFloat(document.getElementById('t-tp').value) || null),
                tf: document.getElementById('t-tf').value,
                session: document.getElementById('t-session').value,
                mood: document.getElementById('t-mood').value,
                setup: document.getElementById('t-setup').value,
                review: document.getElementById('t-review').value,
                checklist: Array.from(document.querySelectorAll('.check-item input')).map(cb => cb.checked),
                status: manualPnl ? (pnl >= 0 ? 'win' : 'loss') : (exit ? (pnl >= 0 ? 'win' : 'loss') : 'open')
            };
            trades.unshift(trade);
            localStorage.setItem('forex_journal_trades', JSON.stringify(trades));
            alert('✅ Trade saved successfully!');
            document.getElementById('tradeForm').reset();
            document.querySelectorAll('.mood-option').forEach(m => m.classList.remove('selected'));
            document.querySelectorAll('.check-item').forEach(c => { c.classList.remove('checked'); c.querySelector('input').checked = false; });
            updateDashboard();
        }

        function getPairStats(tradeList) {
            tradeList = tradeList || trades;
            let pairMap = {};
            tradeList.forEach(t => {
                if (!pairMap[t.pair]) pairMap[t.pair] = { pnl: 0, count: 0, wins: 0 };
                pairMap[t.pair].pnl += (t.pnl || 0);
                pairMap[t.pair].count++;
                if (t.status === 'win') pairMap[t.pair].wins++;
            });
            return pairMap;
        }

        function updateDashboard() {
            let acc = getCurrentAccount();
            let accTrades = acc ? trades.filter(t => t.accountId == acc.id) : trades;
            let total = accTrades.length;
            let wins = accTrades.filter(t => t.status === 'win').length;
            let losses = accTrades.filter(t => t.status === 'loss').length;
            let winRate = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;
            let totalPnl = accTrades.reduce((s, t) => s + (t.pnl || 0), 0);
            let grossProfit = trades.filter(t => t.pnl > 0).reduce((s, t) => s + t.pnl, 0);
            let grossLoss = Math.abs(trades.filter(t => t.pnl < 0).reduce((s, t) => s + t.pnl, 0));
            let pf = grossLoss > 0 ? (grossProfit / grossLoss).toFixed(2) : (grossProfit > 0 ? '∞' : '0.00');
            let running = 0, maxDD = 0, peak = 0;
            trades.slice().reverse().forEach(t => {
                running += (t.pnl || 0);
                if (running > peak) peak = running;
                let dd = peak - running;
                if (dd > maxDD) maxDD = dd;
            });
            let avgRR = trades.filter(t => t.rr).length > 0 ? (trades.filter(t => t.rr).reduce((s, t) => s + parseFloat(t.rr), 0) / trades.filter(t => t.rr).length).toFixed(2) : '0.0';

            document.getElementById('dash-pnl').textContent = formatJournalMoney(totalPnl);
            document.getElementById('dash-pnl').style.color = totalPnl >= 0 ? 'var(--green)' : 'var(--red)';
            document.getElementById('dash-winrate').textContent = winRate + '%';
            document.getElementById('dash-total').textContent = total;
            document.getElementById('dash-pf').textContent = pf;
            document.getElementById('dash-pf').style.color = parseFloat(pf) >= 1.5 ? 'var(--green)' : (parseFloat(pf) >= 1 ? 'var(--gold)' : 'var(--red)');
            document.getElementById('dash-drawdown').textContent = formatJournalMoney(maxDD);
            document.getElementById('dash-rr').textContent = avgRR;

            let pairMap = getPairStats(accTrades);
            let pairHTML = '<div class="form-grid">';
            Object.entries(pairMap).forEach(([pair, data]) => {
                let wr = ((data.wins / data.count) * 100).toFixed(0);
                pairHTML += `<div class="journal-stat-box ${data.pnl >= 0 ? 'green' : 'red'}" style="text-align:left;">
                    <div style="font-size:0.85rem; font-weight:700;">${pair}</div>
                    <div style="font-size:1.3rem; font-weight:700; margin:6px 0; font-family:Orbitron;">${formatJournalMoney(data.pnl)}</div>
                    <div style="font-size:0.75rem; color:var(--text-muted);">${data.count} trades · ${wr}% WR</div>
                </div>`;
            });
            pairHTML += '</div>';
            if (Object.keys(pairMap).length === 0) pairHTML = '<p style="color:var(--text-muted); text-align:center; padding:40px;">No trades yet. Log your first trade!</p>';
            document.getElementById('pair-stats').innerHTML = pairHTML;

            let notes = accTrades.filter(t => t.review).slice(0, 5);
            document.getElementById('recent-notes').innerHTML = notes.length ? notes.map(t =>
                `<div style="padding:16px; background:var(--bg-input); border-radius:12px; margin-bottom:10px; border:1px solid var(--border);">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <strong style="color:var(--red); font-family:Orbitron;">${t.pair}</strong>
                        <span style="color:var(--text-muted); font-size:0.8rem;">${formatDate(t.date)}</span>
                    </div>
                    <div style="font-size:0.9rem; color:var(--text-muted);">${t.review}</div>
                </div>`
            ).join('') : '<p style="color:var(--text-muted); text-align:center; padding:40px;">No trade reviews yet.</p>';
        }

        function renderTrades() {
            let filterAccount = document.getElementById('filter-account').value;
            let filterPair = document.getElementById('filter-pair').value;
            let filterResult = document.getElementById('filter-result').value;
            let filtered = trades.filter(t => {
                if (filterAccount && t.accountId != filterAccount) return false;
                if (filterPair && t.pair !== filterPair) return false;
                if (filterResult && t.status !== filterResult) return false;
                return true;
            });
            if (filtered.length === 0) {
                document.getElementById('trade-list').innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No trades found matching your filters.</p></div>`;
                return;
            }
            let html = `<table class="trade-table"><thead><tr>
                <th>Date</th><th>Pair</th><th>Dir</th><th>Account</th><th>Entry</th><th>SL</th><th>TP</th><th>Exit</th><th>Lot</th><th>Risk</th><th>R:R</th><th>P&L</th><th>Status</th><th>Action</th>
            </tr></thead><tbody>`;
            filtered.forEach(t => {
                html += `<tr>
                    <td>${formatDate(t.date)}</td>
                    <td><strong style="font-family:Orbitron;">${t.pair}</strong></td>
                    <td><span class="badge badge-${t.direction === 'Buy' ? 'buy' : 'sell'}">${t.direction}</span></td>
                    <td>${getAccountShortLabel(getAccountById(t.accountId)) || (t.accountType === 'funded' ? '<span style="color:var(--gold); font-weight:700;">🏢 ' + (t.provider || 'Funded') + ' P' + (t.phase || '?') + '</span>' : '<span style="color:var(--text-muted);">Personal</span>')}</td>
                    <td>${t.entry}</td>
                    <td>${t.sl}</td>
                    <td>${t.tp || '-'}</td>
                    <td>${t.exit || '-'}</td>
                    <td>${t.lot}</td>
                    <td>${t.risk ? t.risk + '%' : '-'}</td>
                    <td>1:${t.rr || '-'}</td>
                    <td style="color:${(t.pnl||0)>=0?'var(--green)':'var(--red)'}; font-weight:700; font-family:Orbitron;">${formatJournalMoney(t.pnl)}</td>
                    <td><span class="badge badge-${t.status}">${t.status.toUpperCase()}</span></td>
                    <td>
                        <button class="btn btn-outline" style="padding:6px 12px; font-size:0.8rem;" onclick="toggleDetail(${t.id})">👁️</button>
                        <button class="btn btn-outline" style="padding:6px 12px; font-size:0.8rem; border-color:var(--gold); color:var(--gold);" onclick="editTrade(${t.id})">✏️</button>
                        <button class="btn btn-danger" style="padding:6px 12px; font-size:0.8rem;" onclick="deleteTrade(${t.id})">🗑️</button>
                    </td>
                </tr>
                <tr id="detail-${t.id}" class="trade-detail">
                    <td colspan="13">
                        <div class="detail-grid">
                            <div class="detail-item"><strong>Strategy</strong>${t.strategy || '-'}</div>
                            <div class="detail-item"><strong>Timeframe</strong>${t.tf}</div>
                            <div class="detail-item"><strong>Session</strong>${t.session}</div>
                            <div class="detail-item"><strong>Account</strong>${getAccountShortLabel(getAccountById(t.accountId)) || (t.accountType === 'funded' ? '🏢 ' + (t.provider || 'Funded') + ' — Phase ' + (t.phase || '?') : 'Personal Account')}</div>
                            <div class="detail-item"><strong>Provider</strong>${t.provider || '-'}</div>
                            <div class="detail-item"><strong>Challenge Status</strong>${t.challengeStatus === 'passed' ? '✅ Passed' : t.challengeStatus === 'failed' ? '❌ Failed' : t.challengeStatus === 'active' ? '🟡 Active' : '-'}</div>
                            <div class="detail-item"><strong>Risk</strong>${t.risk ? t.risk + '%' : '-'}</div>
                            <div class="detail-item"><strong>R:R Target</strong>${t.rrTarget || '-'}</div>
                            <div class="detail-item"><strong>Mood</strong>${t.mood || '-'}</div>
                            <div class="detail-item" style="grid-column:1/-1;"><strong>Setup</strong>${t.setup || '-'}</div>
                            <div class="detail-item" style="grid-column:1/-1;"><strong>Review</strong>${t.review || '-'}</div>
                        </div>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('trade-list').innerHTML = html;
        }

        function toggleDetail(id) {
            let el = document.getElementById('detail-' + id);
            el.classList.toggle('show');
        }
        function deleteTrade(id) {
            if (!confirm('Delete this trade?')) return;
            trades = trades.filter(t => t.id !== id);
            localStorage.setItem('forex_journal_trades', JSON.stringify(trades));
            renderTrades();
            updateDashboard();
        }
        function clearAll() {
            if (!confirm('⚠️ Delete ALL trades? This cannot be undone!')) return;
            trades = [];
            localStorage.removeItem('forex_journal_trades');
            renderTrades();
            updateDashboard();
        }

        function renderCalendar() {
            let acc = getCurrentAccount();
            let accTrades = acc ? trades.filter(t => t.accountId == acc.id) : trades;
            let today = new Date();
            let startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            let days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            let html = '';
            for (let i = 0; i < 7; i++) {
                let d = new Date(startOfWeek);
                d.setDate(startOfWeek.getDate() + i);
                let dateStr = d.toISOString().split('T')[0];
                let dayTrades = accTrades.filter(t => t.date === dateStr);
                let dayPnl = dayTrades.reduce((s, t) => s + (t.pnl || 0), 0);
                let hasTrade = dayTrades.length > 0;
                html += `<div class="day-box ${hasTrade ? 'has-trade' : ''}">
                    <div class="day-name">${days[i]}</div>
                    <div class="day-num">${d.getDate()}</div>
                    <div class="pnl ${dayPnl >= 0 ? 'pos' : 'neg'}">${hasTrade ? formatJournalMoney(dayPnl) : '-'}</div>
                    ${hasTrade ? `<div style="font-size:0.7rem; color:var(--text-muted); margin-top:4px;">${dayTrades.length} trade${dayTrades.length>1?'s':''}</div>` : ''}
                </div>`;
            }
            document.getElementById('week-cal').innerHTML = html;
        }

        function renderAnalysis() {
            let acc = getCurrentAccount();
            let accTrades = acc ? trades.filter(t => t.accountId == acc.id) : trades;
            let moodMap = {};
            accTrades.forEach(t => {
                if (t.mood) {
                    if (!moodMap[t.mood]) moodMap[t.mood] = { pnl: 0, count: 0 };
                    moodMap[t.mood].pnl += (t.pnl || 0);
                    moodMap[t.mood].count++;
                }
            });
            let psychHTML = Object.entries(moodMap).length ? '<div class="form-grid">' + Object.entries(moodMap).map(([m, d]) =>
                `<div class="journal-stat-box ${d.pnl >= 0 ? 'green' : 'red'}">
                    <div style="font-size:1.5rem; margin-bottom:4px;">${m.split(' ')[0]}</div>
                    <div style="font-size:1.2rem; font-weight:700; font-family:Orbitron;">${formatJournalMoney(d.pnl)}</div>
                    <div style="font-size:0.75rem; color:var(--text-muted);">${d.count} trades</div>
                </div>`
            ).join('') + '</div>' : '<p style="color:var(--text-muted); text-align:center; padding:40px;">Log trades with mood data to see psychology analysis.</p>';
            document.getElementById('psych-analysis').innerHTML = psychHTML;

            let stratMap = {};
            accTrades.forEach(t => {
                if (t.strategy) {
                    if (!stratMap[t.strategy]) stratMap[t.strategy] = { pnl: 0, count: 0, wins: 0 };
                    stratMap[t.strategy].pnl += (t.pnl || 0);
                    stratMap[t.strategy].count++;
                    if (t.status === 'win') stratMap[t.strategy].wins++;
                }
            });
            let stratHTML = Object.entries(stratMap).length ? '<div class="form-grid">' + Object.entries(stratMap).map(([s, d]) => {
                let wr = ((d.wins / d.count) * 100).toFixed(0);
                return `<div class="journal-stat-box ${d.pnl >= 0 ? 'green' : 'red'}" style="text-align:left;">
                    <div style="font-size:0.85rem; font-weight:700;">${s}</div>
                    <div style="font-size:1.3rem; font-weight:700; margin:6px 0; font-family:Orbitron;">${formatJournalMoney(d.pnl)}</div>
                    <div style="font-size:0.75rem; color:var(--text-muted);">${d.count} trades · ${wr}% WR</div>
                </div>`;
            }).join('') + '</div>' : '<p style="color:var(--text-muted); text-align:center; padding:40px;">Log trades with strategy data to see strategy performance.</p>';
            document.getElementById('strategy-stats').innerHTML = stratHTML;

            let pairMap = getPairStats(accTrades);
            let insightsHTML = '';
            if (accTrades.length === 0) {
                insightsHTML = '<p style="color:var(--text-muted); text-align:center; padding:40px;">Start logging trades to generate insights.</p>';
            } else {
                let bestPair = Object.entries(pairMap).sort((a, b) => b[1].pnl - a[1].pnl)[0];
                let worstPair = Object.entries(pairMap).sort((a, b) => a[1].pnl - b[1].pnl)[0];
                let bestStrat = Object.entries(stratMap).sort((a, b) => b[1].pnl - a[1].pnl)[0];
                let bestSession = {};
                trades.forEach(t => { if (t.session) { if (!bestSession[t.session]) bestSession[t.session] = { pnl: 0, count: 0 }; bestSession[t.session].pnl += (t.pnl || 0); bestSession[t.session].count++; } });
                let topSession = Object.entries(bestSession).sort((a, b) => b[1].pnl - a[1].pnl)[0];
                insightsHTML = `<div style="display:flex; flex-direction:column; gap:12px;">`;
                if (bestPair) insightsHTML += `<div style="padding:14px; background:var(--green-dim); border-radius:10px; border-left:3px solid var(--green);"><strong style="color:var(--green);">Best Pair:</strong> ${bestPair[0]} (${formatJournalMoney(bestPair[1].pnl)})</div>`;
                if (worstPair && worstPair[1].pnl < 0) insightsHTML += `<div style="padding:14px; background:var(--red-dim); border-radius:10px; border-left:3px solid var(--red);"><strong style="color:var(--red);">Worst Pair:</strong> ${worstPair[0]} (${formatJournalMoney(worstPair[1].pnl)})</div>`;
                if (bestStrat) insightsHTML += `<div style="padding:14px; background:var(--red-dim); border-radius:10px; border-left:3px solid var(--red);"><strong style="color:var(--red);">Best Strategy:</strong> ${bestStrat[0]} (${formatJournalMoney(bestStrat[1].pnl)})</div>`;
                if (topSession) insightsHTML += `<div style="padding:14px; background:var(--gold-dim); border-radius:10px; border-left:3px solid var(--gold);"><strong style="color:var(--gold);">Best Session:</strong> ${topSession[0]} (${formatJournalMoney(topSession[1].pnl)})</div>`;
                let checkedTrades = accTrades.filter(t => t.checklist && t.checklist.some(c => c));
                let uncheckedTrades = accTrades.filter(t => !t.checklist || !t.checklist.some(c => c));
                if (checkedTrades.length > 0 && uncheckedTrades.length > 0) {
                    let checkedAvg = checkedTrades.reduce((s, t) => s + (t.pnl || 0), 0) / checkedTrades.length;
                    let uncheckedAvg = uncheckedTrades.reduce((s, t) => s + (t.pnl || 0), 0) / uncheckedTrades.length;
                    if (checkedAvg > uncheckedAvg) insightsHTML += `<div style="padding:14px; background:var(--green-dim); border-radius:10px; border-left:3px solid var(--green);"><strong style="color:var(--green);">Checklist Effect:</strong> With checklist: ${formatJournalMoney(checkedAvg)} vs Without: ${formatJournalMoney(uncheckedAvg)}</div>`;
                }
                insightsHTML += `</div>`;
            }
            document.getElementById('insights').innerHTML = insightsHTML;
        }

        function exportCSV() {
            if (accTrades.length === 0) { alert('No trades to export.'); return; }
            let csv = 'Date,Pair,Direction,Strategy,AccountType,AccountName,Phase,ChallengeTarget,ChallengeStatus,Entry,SL,TP,Exit,Lot,Risk%,RRTarget,PnL,RRActual,Timeframe,Session,Mood,Status\n';
            trades.forEach(t => {
                let accName = getAccountById(t.accountId)?.name || '';
                csv += `${t.date},${t.pair},${t.direction},${t.strategy || ''},${t.accountType || 'personal'},${accName},${t.phase || ''},${t.challengeTarget || ''},${t.challengeStatus || ''},${t.entry},${t.sl},${t.tp || ''},${t.exit || ''},${t.lot},${t.risk || ''},${t.rrTarget || ''},${t.pnl || 0},${t.rr || ''},${t.tf},${t.session},${t.mood || ''},${t.status}\n`;
            });
            let blob = new Blob([csv], { type: 'text/csv' });
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url;
            a.download = 'trading_journal_' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function initFilters() {
            let pairFilter = document.getElementById('filter-pair');
            let accFilter = document.getElementById('filter-account');
            if (pairFilter) {
                pairFilter.innerHTML = '<option value="">All Pairs</option>';
                let uniquePairs = [...new Set(trades.map(t => t.pair))];
                uniquePairs.forEach(p => {
                    let opt = document.createElement('option');
                    opt.value = p;
                    opt.textContent = p;
                    pairFilter.appendChild(opt);
                });
            }
            if (accFilter) {
                accFilter.innerHTML = '<option value="">All Accounts</option>';
                getAccounts().forEach(a => {
                    let opt = document.createElement('option');
                    opt.value = a.id;
                    opt.textContent = a.name || 'Account';
                    accFilter.appendChild(opt);
                });
            }
        }

        let editingTradeId = null;
        function editTrade(id) {
            let trade = trades.find(t => t.id === id);
            if (!trade) return;
            editingTradeId = id;
            document.getElementById('t-date').value = trade.date;
            document.getElementById('t-pair').value = trade.pair;
            document.getElementById('t-dir').value = trade.direction;
            document.getElementById('t-strategy').value = trade.strategy || '';
            document.getElementById('t-entry').value = trade.entry;
            document.getElementById('t-sl').value = trade.sl;
            document.getElementById('t-tp').value = trade.tp || '';
            document.getElementById('t-exit').value = trade.exit || '';
            document.getElementById('t-lot').value = trade.lot;
            document.getElementById('t-risk').value = trade.risk || '';
            document.getElementById('t-rr-target').value = trade.rrTarget || '';
            document.getElementById('t-pnl').value = trade.pnl || '';
            document.getElementById('t-tf').value = trade.tf;
            document.getElementById('t-session').value = trade.session;
            if (trade.accountId) {
                let tAccSel = document.getElementById('t-account-id');
                if (tAccSel) tAccSel.value = trade.accountId;
            }
            updateTradeAccountInfo();
            toggleFundedFields();
            toggleFundedFields();
            document.getElementById('t-setup').value = trade.setup || '';
            document.getElementById('t-review').value = trade.review || '';
            document.getElementById('t-mood').value = trade.mood || '';
            document.querySelectorAll('.mood-option').forEach(m => { m.classList.remove('selected'); if (trade.mood && m.textContent === trade.mood) m.classList.add('selected'); });
            let checkboxes = document.querySelectorAll('.check-item input');
            let checkItems = document.querySelectorAll('.check-item');
            if (trade.checklist) trade.checklist.forEach((checked, i) => { if (checkboxes[i]) { checkboxes[i].checked = checked; checkItems[i].classList.toggle('checked', checked); } });
            showJournalTab('j-new-trade');
            document.querySelectorAll('.journal-tab').forEach(b => b.classList.remove('active'));
            document.querySelector('.journal-tab[onclick="showJournalTab(\'j-new-trade\')"]').classList.add('active');
            let submitBtn = document.querySelector('#tradeForm button[type="submit"]');
            submitBtn.textContent = 'Update Trade';
            submitBtn.onclick = function(e) { updateTrade(e); };
            let cancelBtn = document.getElementById('cancel-edit-btn');
            if (!cancelBtn) {
                cancelBtn = document.createElement('button');
                cancelBtn.id = 'cancel-edit-btn';
                cancelBtn.type = 'button';
                cancelBtn.className = 'btn btn-outline';
                cancelBtn.textContent = 'Cancel Edit';
                cancelBtn.onclick = cancelEdit;
                submitBtn.parentNode.insertBefore(cancelBtn, submitBtn.nextSibling);
            }
            cancelBtn.style.display = 'inline-flex';
            document.getElementById('tradeForm').scrollIntoView({ behavior: 'smooth' });
        }

        function updateTrade(e) {
            e.preventDefault();
            if (!editingTradeId) return;
            let idx = trades.findIndex(t => t.id === editingTradeId);
            if (idx === -1) return;
            let accId = document.getElementById('t-account-id').value;
            let acc = getAccountById(accId);
            if (!acc) { alert('Please select an account.'); return; }
            let pair = document.getElementById('t-pair').value;
            let entry = parseFloat(document.getElementById('t-entry').value) || null;
            let exit = parseFloat(document.getElementById('t-exit').value) || null;
            let dir = document.getElementById('t-dir').value;
            let lot = parseFloat(document.getElementById('t-lot').value) || null;
            let manualPnl = document.getElementById('t-pnl').value;

            if (!manualPnl && (!entry || !exit)) {
                alert('⚠️ Please enter both Entry Price and Exit Price for auto P&L calculation.\nOr enter a manual P&L value to override.');
                return;
            }

            let pnl = manualPnl ? parseFloat(manualPnl) : (entry && exit && lot ? calcAutoPnL(dir, entry, exit, lot, pair) : 0);
            let updAccountType = acc.type;
            trades[idx] = {
                id: editingTradeId,
                accountId: accId,
                date: document.getElementById('t-date').value,
                pair: pair, direction: dir,
                strategy: document.getElementById('t-strategy').value,
                accountType: updAccountType,
                provider: updAccountType === 'funded' ? (acc.provider || 'FTMO') : null,
                phase: updAccountType === 'funded' ? (acc.phase || '1') : null,
                challengeTarget: updAccountType === 'funded' ? (acc.target1 || 10) : null,
                challengeStatus: updAccountType === 'funded' ? (acc.status || 'active') : null,
                entry: entry, sl: parseFloat(document.getElementById('t-sl').value) || null,
                tp: parseFloat(document.getElementById('t-tp').value) || null,
                exit: exit, lot: lot,
                risk: parseFloat(document.getElementById('t-risk').value) || null,
                rrTarget: document.getElementById('t-rr-target').value || null,
                pnl: pnl, rr: calcRR(entry, parseFloat(document.getElementById('t-sl').value) || null, parseFloat(document.getElementById('t-tp').value) || null),
                tf: document.getElementById('t-tf').value, session: document.getElementById('t-session').value,
                mood: document.getElementById('t-mood').value, setup: document.getElementById('t-setup').value,
                review: document.getElementById('t-review').value,
                checklist: Array.from(document.querySelectorAll('.check-item input')).map(cb => cb.checked),
                status: manualPnl ? (pnl >= 0 ? 'win' : 'loss') : (exit ? (pnl >= 0 ? 'win' : 'loss') : 'open')
            };
            localStorage.setItem('forex_journal_trades', JSON.stringify(trades));
            alert('Trade updated successfully!');
            cancelEdit();
            updateDashboard();
            renderTrades();
        }

        function cancelEdit() {
            editingTradeId = null;
            document.getElementById('tradeForm').reset();
            document.querySelectorAll('.mood-option').forEach(m => m.classList.remove('selected'));
            document.querySelectorAll('.check-item').forEach(c => { c.classList.remove('checked'); c.querySelector('input').checked = false; });
            renderAccountSelector();
            toggleFundedFields();
            let submitBtn = document.querySelector('#tradeForm button[type="submit"]');
            submitBtn.textContent = 'Save Trade';
            submitBtn.onclick = function(e) { addTrade(e); };
            let cancelBtn = document.getElementById('cancel-edit-btn');
            if (cancelBtn) cancelBtn.style.display = 'none';
            document.getElementById('t-rr-target').value = '';
            document.getElementById('t-date').valueAsDate = new Date();
        }

        function updateStepTargets() {
            let steps = parseInt(document.getElementById('setup-steps').value) || 2;
            let container3 = document.getElementById('setup-target-3-container');
            if (container3) container3.style.display = steps >= 3 ? 'block' : 'none';
        }
        function updateChStepTargets() {
            let steps = parseInt(document.getElementById('ch-setup-steps').value) || 2;
            let container3 = document.getElementById('ch-setup-target-3-container');
            if (container3) container3.style.display = steps >= 3 ? 'block' : 'none';
        }
        function setAllTargets(t1, t2, t3) {
            document.getElementById('setup-target-1').value = t1;
            document.getElementById('setup-target-2').value = t2;
            document.getElementById('setup-target-3').value = t3;
        }

        let calendarView = 'week';



        function checkAccountSetup() {
            let accs = getAccounts();
            if (accs.length === 0) {
                document.getElementById('account-setup').style.display = 'flex';
                document.getElementById('account-settings-bar').style.display = 'none';
                renderAccountList();
            } else {
                document.getElementById('account-setup').style.display = 'none';
                document.getElementById('account-settings-bar').style.display = 'flex';
                renderAccountSelector();
                updateAccountBadge();
                if (!currentAccountId) setCurrentAccount(accs[0].id);
            }
        }
        function closeAccountSetup() {
            document.getElementById('account-setup').style.display = 'none';
        }

        function setTradeRisk(val) { document.getElementById('t-risk').value = val; }
        function setTradeRR(val) { document.getElementById('t-rr-target').value = val; }
        function parseRRInput(val) {
            if (!val) return;
            let normalized = val.trim().replace(',', '.').replace('-', ':');
            if (!normalized.includes(':') && !isNaN(parseFloat(normalized))) {
                normalized = '1:' + parseFloat(normalized);
            }
            else if (!normalized.includes(':') && normalized.includes('.')) {
                let num = parseFloat(normalized);
                if (!isNaN(num)) normalized = '1:' + num;
            }
            document.getElementById('t-rr-target').value = normalized;
        }
        function setProfRR(val) {
            document.getElementById('prof-rr').value = val;
            calcProfitability();
        }
        function setCalendarView(view) {
            calendarView = view;
            document.getElementById('cal-week-btn').style.background = view === 'week' ? 'var(--red)' : 'transparent';
            document.getElementById('cal-week-btn').style.color = view === 'week' ? 'white' : 'var(--text-muted)';
            document.getElementById('cal-day-btn').style.background = view === 'day' ? 'var(--red)' : 'transparent';
            document.getElementById('cal-day-btn').style.color = view === 'day' ? 'white' : 'var(--text-muted)';
            if (view === 'week') { document.getElementById('week-cal').style.display = 'grid'; document.getElementById('day-cal').style.display = 'none'; renderCalendar(); }
            else { document.getElementById('week-cal').style.display = 'none'; document.getElementById('day-cal').style.display = 'block'; renderDailyCalendar(); }
        }
        function renderDailyCalendar() {
            let acc = getCurrentAccount();
            let accTrades = acc ? trades.filter(t => t.accountId == acc.id) : trades;
            let today = new Date();
            let currentMonth = today.getMonth();
            let currentYear = today.getFullYear();
            let monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            let daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            let firstDay = new Date(currentYear, currentMonth, 1).getDay();
            let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;"><h3 style="margin:0; color:var(--text); font-family:Orbitron;">${monthNames[currentMonth]} ${currentYear}</h3></div>`;
            html += '<div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px; margin-bottom:8px;">';
            let dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            dayNames.forEach(d => { html += `<div style="text-align:center; color:var(--text-muted); font-size:0.75rem; font-weight:700; text-transform:uppercase; padding:8px 0;">${d}</div>`; });
            html += '</div>';
            html += '<div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px;">';
            for (let i = 0; i < firstDay; i++) html += '<div style="min-height:80px; background:transparent; border-radius:8px;"></div>';
            for (let day = 1; day <= daysInMonth; day++) {
                let dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                let dayTrades = accTrades.filter(t => t.date === dateStr);
                let dayPnl = dayTrades.reduce((s, t) => s + (t.pnl || 0), 0);
                let hasTrade = dayTrades.length > 0;
                let isToday = day === today.getDate();
                html += `<div style="min-height:80px; background:var(--bg-input); border:1px solid ${isToday ? 'var(--red)' : (hasTrade ? 'var(--green)' : 'var(--border)')}; border-radius:8px; padding:10px; text-align:center; position:relative; ${isToday ? 'box-shadow:0 0 0 2px rgba(220,38,38,0.3);' : ''}">
                    <div style="font-size:0.9rem; font-weight:700; color:${isToday ? 'var(--red)' : 'var(--text)'}; font-family:Orbitron;">${day}</div>
                    ${hasTrade ? `<div style="font-size:0.8rem; font-weight:700; color:${dayPnl >= 0 ? 'var(--green)' : 'var(--red)'}; margin-top:4px; font-family:Orbitron;">${formatJournalMoney(dayPnl)}</div><div style="font-size:0.65rem; color:var(--text-muted); margin-top:2px;">${dayTrades.length} trade${dayTrades.length>1?'s':''}</div>` : ''}
                </div>`;
            }
            html += '</div>';
            document.getElementById('day-cal').innerHTML = html;
        }


        // ==================== CHALLENGE TRACKER ====================
        function getChallengeConfig() {
            let acc = getCurrentAccount();
            if (acc && acc.type === 'funded') {
                return {
                    balance: acc.balance || 5000,
                    steps: acc.steps || 2,
                    phase: acc.phase || '1',
                    target1: acc.target1 || 10,
                    target2: acc.target2 || 5,
                    target3: acc.target3 || 0,
                    drawdown: 10,
                    dailyLimit: 5,
                    startDate: acc.startDate || new Date().toISOString().split('T')[0],
                    status: acc.status || 'active'
                };
            }
            let saved = localStorage.getItem('forex_challenge_config');
            return saved ? JSON.parse(saved) : {
                balance: 5000, steps: 2, phase: '1', target1: 10, target2: 5, target3: 0,
                drawdown: 10, dailyLimit: 5, startDate: new Date().toISOString().split('T')[0], status: 'active'
            };
        }

        function showChallengeSetup() {
            let challengeConfig = getChallengeConfig();
            document.getElementById('challenge-setup-modal').style.display = 'flex';
            document.getElementById('ch-setup-balance').value = challengeConfig.balance;
            document.getElementById('ch-setup-steps').value = challengeConfig.steps || 2;
            document.getElementById('ch-setup-phase').value = challengeConfig.phase;
            document.getElementById('ch-setup-target-1').value = challengeConfig.target1 || 10;
            document.getElementById('ch-setup-target-2').value = challengeConfig.target2 || 5;
            document.getElementById('ch-setup-target-3').value = challengeConfig.target3 || 0;
            document.getElementById('ch-setup-drawdown').value = challengeConfig.drawdown;
            document.getElementById('ch-setup-daily').value = challengeConfig.dailyLimit;
            updateChStepTargets();
        }

        function closeChallengeSetup() {
            document.getElementById('challenge-setup-modal').style.display = 'none';
        }

        function saveChallengeSetup() {
            let challengeConfig = getChallengeConfig();
            challengeConfig.balance = parseFloat(document.getElementById('ch-setup-balance').value) || 5000;
            challengeConfig.steps = parseInt(document.getElementById('ch-setup-steps').value) || 2;
            challengeConfig.phase = document.getElementById('ch-setup-phase').value;
            challengeConfig.target1 = parseFloat(document.getElementById('ch-setup-target-1').value) || 10;
            challengeConfig.target2 = parseFloat(document.getElementById('ch-setup-target-2').value) || 5;
            challengeConfig.target3 = parseFloat(document.getElementById('ch-setup-target-3').value) || 0;
            challengeConfig.drawdown = parseFloat(document.getElementById('ch-setup-drawdown').value) || 10;
            challengeConfig.dailyLimit = parseFloat(document.getElementById('ch-setup-daily').value) || 5;
            localStorage.setItem('forex_challenge_config', JSON.stringify(challengeConfig));
            // Also update the current account if it exists
            let acc = getCurrentAccount();
            if (acc) {
                let accs = getAccounts();
                let idx = accs.findIndex(a => a.id == acc.id);
                if (idx !== -1) {
                    accs[idx].balance = challengeConfig.balance;
                    accs[idx].steps = challengeConfig.steps;
                    accs[idx].phase = challengeConfig.phase;
                    accs[idx].target1 = challengeConfig.target1;
                    accs[idx].target2 = challengeConfig.target2;
                    accs[idx].target3 = challengeConfig.target3;
                    accs[idx].status = challengeConfig.status;
                    saveAccounts(accs);
                }
            }
            closeChallengeSetup();
            renderChallenge();
            renderAccountSelector();
            updateAccountBadge();
        }

        function renderChallenge() {
            let challengeConfig = getChallengeConfig();
            let acc = getCurrentAccount();
            let challengeTrades = trades.filter(t => t.accountId == (acc ? acc.id : null) && t.accountType === 'funded');
            let totalPnl = challengeTrades.reduce((s, t) => s + (t.pnl || 0), 0);
            let steps = challengeConfig.steps || 2;
            let currentPhase = parseInt(challengeConfig.phase) || 1;
            let target1 = challengeConfig.target1 || 10;
            let target2 = challengeConfig.target2 || 5;
            let target3 = challengeConfig.target3 || 0;
            let maxLoss = -(challengeConfig.balance * challengeConfig.drawdown / 100);
            let isFailed = totalPnl <= maxLoss;

            let providerName = (acc && acc.provider) || 'Funded';
            document.getElementById('ch-provider-title').textContent = providerName;
            let phaseNames = { '1': 'Step 1', '2': 'Step 2', '3': 'Funded' };
            document.getElementById('ch-steps-display').textContent = steps + '-Step';
            document.getElementById('ch-phase-display').textContent = phaseNames[challengeConfig.phase] || '—';
            document.getElementById('ch-pnl-display').textContent = formatJournalMoney(totalPnl);
            document.getElementById('ch-pnl-display').style.color = totalPnl >= 0 ? 'var(--green)' : 'var(--red)';

            let totalTarget = target1 + target2 + (steps >= 3 ? target3 : 0);
            let overallProgress = totalTarget > 0 ? (totalPnl / challengeConfig.balance) * 100 : 0;
            document.getElementById('ch-progress-display').textContent = overallProgress.toFixed(2) + '%';
            document.getElementById('ch-progress-display').style.color = isFailed ? 'var(--red)' : 'var(--gold)';

            let stepTargets = [target1, target2, target3];
            let stepLabels = ['Step 1 — Evaluation', 'Step 2 — Verification', 'Step 3 — Funded Live'];
            let multiStepHTML = '';
            for (let i = 0; i < steps; i++) {
                let st = stepTargets[i] || 0;
                if (st <= 0 && i === 2) st = 0;
                let stepProgress = (totalPnl / challengeConfig.balance) * 100;
                let stepPct = st > 0 ? Math.min(Math.max((stepProgress / st) * 100, 0), 100) : 100;
                let isStepDone = stepProgress >= st && st > 0;
                let isStepCurrent = currentPhase == (i + 1);
                let stepColor = isStepDone ? 'var(--green)' : (isStepCurrent ? 'var(--gold)' : 'var(--text-muted)');
                let stepBg = isStepDone ? 'var(--green-dim)' : (isStepCurrent ? 'var(--gold-dim)' : 'var(--bg-input)');
                let stepBorder = isStepDone ? 'var(--green)' : (isStepCurrent ? 'var(--gold)' : 'var(--border)');
                let icon = isStepDone ? '✅' : (isStepCurrent ? '🔄' : '⏳');
                let barColor = isStepDone ? 'var(--green)' : (isStepCurrent ? 'var(--gold)' : 'var(--border)');

                multiStepHTML += `<div style="margin-bottom:16px; padding:16px; background:${stepBg}; border:1px solid ${stepBorder}; border-radius:14px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="font-size:1.5rem;">${icon}</span>
                            <div>
                                <div style="font-weight:700; font-family:Orbitron; font-size:1rem; color:${stepColor};">${stepLabels[i]}</div>
                                <div style="font-size:0.8rem; color:var(--text-muted);">Target: ${st}% · Progress: ${stepProgress.toFixed(2)}%</div>
                            </div>
                        </div>
                        <div style="font-size:1.2rem; font-weight:800; font-family:Orbitron; color:${stepColor};">${stepPct.toFixed(0)}%</div>
                    </div>
                    <div style="height:12px; background:var(--bg-card); border-radius:6px; overflow:hidden;">
                        <div style="height:100%; width:${stepPct}%; background:${barColor}; border-radius:6px; transition:width 0.6s ease;"></div>
                    </div>
                </div>`;
            }
            document.getElementById('multi-step-progress').innerHTML = multiStepHTML;

            let stepsList = [];
            for (let i = 0; i < steps; i++) {
                let st = stepTargets[i] || 0;
                let stepProgress = (totalPnl / challengeConfig.balance) * 100;
                let isDone = st > 0 ? stepProgress >= st : false;
                let isCurrent = currentPhase == (i + 1) && !isDone;
                stepsList.push({
                    label: stepLabels[i] + (st > 0 ? ' — ' + st + '% Target' : ''),
                    desc: isDone ? 'Completed! Move to next step.' : (isCurrent ? 'Current phase — keep pushing!' : 'Pending'),
                    done: isDone,
                    current: isCurrent,
                    pct: st > 0 ? Math.min((stepProgress / st) * 100, 100) : 0
                });
            }

            let stepsHTML = '';
            stepsList.forEach((step, i) => {
                let bg = step.done ? 'var(--green-dim)' : (step.current ? 'var(--gold-dim)' : 'var(--bg-input)');
                let border = step.done ? 'var(--green)' : (step.current ? 'var(--gold)' : 'var(--border)');
                let icon = step.done ? '✅' : (step.current ? '🔄' : '⏳');
                let color = step.done ? 'var(--green)' : (step.current ? 'var(--gold)' : 'var(--text-muted)');
                stepsHTML += `<div style="display:flex; align-items:center; gap:16px; padding:16px; background:${bg}; border:1px solid ${border}; border-radius:14px;">
                    <div style="font-size:2rem;">${icon}</div>
                    <div style="flex:1;">
                        <div style="font-weight:700; color:${color}; font-family:Orbitron; font-size:1rem;">${step.label}</div>
                        <div style="font-size:0.8rem; color:var(--text-muted); margin-top:2px;">${step.desc}</div>
                        ${!step.done && step.pct > 0 ? `<div style="margin-top:8px; height:6px; background:var(--bg-card); border-radius:3px; overflow:hidden;">
                            <div style="height:100%; width:${step.pct}%; background:${step.current ? 'var(--gold)' : 'var(--border)'}; border-radius:3px; transition:width 0.4s;"></div>
                        </div>` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('challenge-steps').innerHTML = stepsHTML || '<p style="color:var(--text-muted); text-align:center;">No steps configured.</p>';

            let wins = challengeTrades.filter(t => t.status === 'win').length;
            let total = challengeTrades.length;
            let winRate = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;
            let rrTrades = challengeTrades.filter(t => t.rr);
            let avgRR = rrTrades.length > 0 ? (rrTrades.reduce((s, t) => s + parseFloat(t.rr), 0) / rrTrades.length).toFixed(2) : '0.0';
            let best = challengeTrades.length > 0 ? Math.max(...challengeTrades.map(t => t.pnl || 0)) : 0;
            let worst = challengeTrades.length > 0 ? Math.min(...challengeTrades.map(t => t.pnl || 0)) : 0;
            let uniqueDays = [...new Set(challengeTrades.map(t => t.date))].length;

            document.getElementById('ch-trade-count').textContent = total;
            document.getElementById('ch-winrate').textContent = winRate + '%';
            document.getElementById('ch-avg-rr').textContent = avgRR;
            document.getElementById('ch-best-trade').textContent = formatJournalMoney(best);
            document.getElementById('ch-worst-trade').textContent = formatJournalMoney(worst);
            document.getElementById('ch-days').textContent = uniqueDays;

            let banner = document.getElementById('ch-status-banner');
            banner.style.display = 'block';
            let currentTarget = stepTargets[currentPhase - 1] || 0;
            let currentProgress = (totalPnl / challengeConfig.balance) * 100;
            if (currentPhase >= steps && currentProgress >= currentTarget && currentTarget > 0) {
                banner.textContent = '🎉 ALL STEPS COMPLETED! Challenge passed.';
                banner.style.background = 'var(--green-dim)';
                banner.style.color = 'var(--green)';
                banner.style.border = '1px solid var(--green)';
            } else if (isFailed) {
                banner.textContent = '❌ CHALLENGE FAILED. Max drawdown reached.';
                banner.style.background = 'var(--red-dim)';
                banner.style.color = 'var(--red)';
                banner.style.border = '1px solid var(--red)';
            } else if (currentProgress >= currentTarget && currentTarget > 0) {
                banner.textContent = '🎉 STEP ' + currentPhase + ' PASSED! Ready for next step.';
                banner.style.background = 'var(--green-dim)';
                banner.style.color = 'var(--green)';
                banner.style.border = '1px solid var(--green)';
            } else {
                let remaining = currentTarget - currentProgress;
                banner.textContent = '🟡 STEP ' + currentPhase + ' ACTIVE — Need ' + remaining.toFixed(2) + '% more to pass';
                banner.style.background = 'var(--gold-dim)';
                banner.style.color = 'var(--gold)';
                banner.style.border = '1px solid var(--gold)';
            }
        }

        
        function renderRiskPanel() {
            let acc = getCurrentAccount();
            let accTrades = acc ? trades.filter(t => t.accountId == acc.id) : trades;
            let savedLimits = JSON.parse(localStorage.getItem('forex_risk_limits') || '{"daily":100,"weekly":300}');
            document.getElementById('risk-daily-limit').value = savedLimits.daily || 100;
            document.getElementById('risk-weekly-limit').value = savedLimits.weekly || 300;
            checkRiskAlarms();
            renderPresets();
            renderEquityCurve();
        }

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', function() {
            renderMarkets();
            initCalc();
            initFilters();
            calcProfitability();
            document.getElementById('t-rr-target').value = '';
            let dateInput = document.getElementById('t-date');
            if (dateInput) dateInput.valueAsDate = new Date();
            // Migrate old single-account data to multi-account if needed
            let oldBalance = localStorage.getItem('forex_journal_balance');
            if (oldBalance && getAccounts().length === 0) {
                let oldAcc = {
                    id: Date.now(),
                    name: 'My Account',
                    balance: parseFloat(oldBalance) || 5000,
                    currency: localStorage.getItem('forex_journal_currency') || 'USD',
                    type: localStorage.getItem('forex_journal_account_type') || 'personal',
                    provider: localStorage.getItem('forex_journal_provider') || 'FTMO',
                    steps: parseInt(localStorage.getItem('forex_journal_steps')) || 2,
                    phase: localStorage.getItem('forex_journal_phase') || '1',
                    target1: parseFloat(localStorage.getItem('forex_journal_target1')) || 10,
                    target2: parseFloat(localStorage.getItem('forex_journal_target2')) || 5,
                    target3: parseFloat(localStorage.getItem('forex_journal_target3')) || 0,
                    status: localStorage.getItem('forex_journal_status') || 'active',
                    startDate: new Date().toISOString().split('T')[0]
                };
                saveAccounts([oldAcc]);
                setCurrentAccount(oldAcc.id);
                // Update existing trades to belong to this account
                trades.forEach(t => { if (!t.accountId) t.accountId = oldAcc.id; });
                localStorage.setItem('forex_journal_trades', JSON.stringify(trades));
            }
            renderAccountSelector();
            updateAccountBadge();
            restorePage();
            checkAccountSetup();
        });
    </script>


    <!-- ==================== NEWS PREDICTION ENGINE JS ==================== -->
    <script>
    // ==================== OPTIMIZED AI PREDICTION ENGINE ====================
